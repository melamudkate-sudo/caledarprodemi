<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Производственный календарь — DEMIAND</title>
<style>
:root{
  --bg:#F6F7F9; --card:#FFFFFF; --text:#1D1F23; --text2:#667085; --border:#E4E7EC;
  --red:#D92D20; --red-hover:#B42318; --red-bg:#FEF3F2;
  --blue:#2563EB; --blue-bg:#EFF4FF;
  --green:#079455; --green-bg:#ECFDF3;
  --amber:#B45309; --amber-bg:#FFFAEB;
  --purple:#7C3AED; --purple-bg:#F5F3FF;
  --indigo:#4F46E5; --indigo-bg:#EEF2FF;
  --pink:#C026A3; --pink-bg:#FDF2FB;
  --teal:#0D9488; --teal-bg:#EFFCFA;
  --gray:#667085; --gray-bg:#F2F4F7;
  --shadow: 0 1px 2px rgba(16,24,40,.04), 0 1px 3px rgba(16,24,40,.06);
  --shadow-lg: 0 4px 12px rgba(16,24,40,.10), 0 2px 4px rgba(16,24,40,.06);
  --radius:14px; --radius-sm:8px;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:var(--bg); color:var(--text);
  font-family:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  font-size:14px; line-height:1.5; -webkit-font-smoothing:antialiased;
}
h1,h2,h3,h4,p{margin:0;}
button{font-family:inherit;}
.icon{width:18px;height:18px;flex:none;display:inline-block;vertical-align:middle;}
::-webkit-scrollbar{width:8px;height:8px;}
::-webkit-scrollbar-thumb{background:#D0D5DD;border-radius:8px;}
a{color:inherit;}
button:focus-visible, [tabindex]:focus-visible, input:focus-visible, select:focus-visible{
  outline:2px solid var(--blue); outline-offset:2px;
}

/* ===== Layout shell ===== */
#app{min-width:1024px; overflow-x:auto;}
.topbar{
  position:sticky; top:0; z-index:40; background:#fff; border-bottom:1px solid var(--border);
  display:flex; align-items:center; gap:16px; padding:0 20px; height:60px;
}
.tb-left{display:flex; align-items:center; gap:10px; flex:none;}
.logo{font-weight:800; letter-spacing:.5px; font-size:15px; color:var(--red);}
.sysname{font-size:13px; color:var(--text2); border-left:1px solid var(--border); padding-left:10px;}
.tb-center{flex:1; display:flex; align-items:center; gap:10px; justify-content:center; max-width:760px; margin:0 auto; position:relative;}
.select-model{
  height:38px; border:1px solid var(--border); border-radius:var(--radius-sm); background:#fff;
  padding:0 30px 0 12px; font-size:13.5px; font-weight:600; color:var(--text); min-width:230px; cursor:pointer;
}
.search-wrap{position:relative; flex:1; max-width:420px;}
.search-input{
  width:100%; height:38px; border:1px solid var(--border); border-radius:var(--radius-sm); padding:0 12px 0 34px;
  font-size:13.5px; background:var(--bg);
}
.search-icon{position:absolute; left:10px; top:10px; color:var(--text2); pointer-events:none;}
.search-results{
  position:absolute; top:44px; left:0; right:0; background:#fff; border:1px solid var(--border); border-radius:var(--radius);
  box-shadow:var(--shadow-lg); max-height:360px; overflow:auto; z-index:60; padding:6px;
}
.search-results .sr-group{font-size:11px; text-transform:uppercase; letter-spacing:.4px; color:var(--text2); padding:8px 8px 4px;}
.sr-item{display:flex; align-items:center; gap:8px; padding:8px; border-radius:8px; cursor:pointer;}
.sr-item:hover{background:var(--bg);}
.sr-item mark{background:#FEF0C7; color:inherit; border-radius:3px;}
.tb-right{display:flex; align-items:center; gap:6px; flex:none;}
.icon-btn{
  width:38px; height:38px; border-radius:var(--radius-sm); border:1px solid transparent; background:none;
  display:flex; align-items:center; justify-content:center; cursor:pointer; color:var(--text2); position:relative;
}
.icon-btn:hover{background:var(--bg); color:var(--text);}
.hint-btn{
  height:38px; padding:0 12px; border-radius:var(--radius-sm); border:1px solid var(--border); background:#fff;
  display:flex; align-items:center; gap:6px; font-size:13px; font-weight:600; cursor:pointer; color:var(--text);
}
.hint-btn:hover{background:var(--bg);}
.badge-dot{
  position:absolute; top:5px; right:5px; min-width:15px; height:15px; border-radius:8px; background:var(--red); color:#fff;
  font-size:9.5px; font-weight:700; display:flex; align-items:center; justify-content:center; padding:0 3px; border:2px solid #fff;
}
.tb-user{display:flex; align-items:center; gap:8px; padding:4px 8px 4px 4px; border-radius:20px; cursor:pointer; border:1px solid transparent;}
.tb-user:hover{background:var(--bg);}
.avatar{
  width:32px; height:32px; border-radius:50%; background:var(--red); color:#fff; font-weight:700; font-size:12.5px;
  display:flex; align-items:center; justify-content:center; flex:none;
}
.tb-user-meta{line-height:1.25;}
.tb-user-name{font-size:13px; font-weight:600;}
.tb-user-role{font-size:11.5px; color:var(--text2);}

.usermenu, .notifmenu{
  position:absolute; top:52px; right:20px; width:300px; background:#fff; border:1px solid var(--border); border-radius:var(--radius);
  box-shadow:var(--shadow-lg); z-index:70; padding:10px; display:none;
}
.usermenu.open, .notifmenu.open{display:block;}
.menu-label{font-size:11px; color:var(--text2); text-transform:uppercase; letter-spacing:.4px; padding:8px 8px 4px;}
.menu-item{
  display:flex; align-items:center; gap:10px; padding:9px 8px; border-radius:8px; cursor:pointer; font-size:13.5px;
}
.menu-item:hover{background:var(--bg);}
.menu-item.active{background:var(--red-bg); color:var(--red); font-weight:600;}
.notif-item{padding:10px 8px; border-radius:8px; cursor:default;}
.notif-item:hover{background:var(--bg);}
.notif-item .nt{font-size:13px;}
.notif-item .nd{font-size:11.5px; color:var(--text2); margin-top:2px;}
.notif-item.unread .nt::before{content:"●"; color:var(--red); margin-right:6px; font-size:9px;}

/* ===== Tabs nav ===== */
.tabsnav{
  position:sticky; top:60px; z-index:35; background:#fff; border-bottom:1px solid var(--border);
  display:flex; gap:4px; padding:0 20px;
}
.tab-btn{
  height:46px; padding:0 16px; border:none; background:none; font-size:13.5px; font-weight:600; color:var(--text2);
  cursor:pointer; border-bottom:2px solid transparent; display:flex; align-items:center; gap:7px;
}
.tab-btn:hover{color:var(--text);}
.tab-btn.active{color:var(--red); border-bottom-color:var(--red);}

main#main-content{max-width:1440px; margin:0 auto; padding:22px 20px 60px;}
.section-title{font-size:20px; font-weight:700; margin-bottom:2px;}
.section-sub{font-size:13.5px; color:var(--text2); margin-bottom:18px;}

/* ===== Cards / grid ===== */
.card{background:var(--card); border:1px solid var(--border); border-radius:var(--radius); box-shadow:var(--shadow);}
.grid{display:grid; gap:14px;}
.grid-4{grid-template-columns:repeat(4,1fr);}
.grid-3{grid-template-columns:repeat(3,1fr);}
.grid-2{grid-template-columns:repeat(2,1fr);}
@media (max-width:1280px){ .grid-4{grid-template-columns:repeat(2,1fr);} .grid-3{grid-template-columns:repeat(2,1fr);} }

.stat-card{padding:16px; cursor:pointer; transition:box-shadow .18s, transform .18s;}
.stat-card:hover{box-shadow:var(--shadow-lg); transform:translateY(-1px);}
.stat-card .stat-num{font-size:26px; font-weight:800; margin:4px 0 2px;}
.stat-card .stat-label{font-size:12.5px; color:var(--text2); font-weight:600;}
.stat-card .stat-sub{font-size:11.5px; color:var(--text2); margin-top:4px;}

/* Badges & pills */
.badge{
  display:inline-flex; align-items:center; gap:5px; font-size:12px; font-weight:600; padding:3px 9px;
  border-radius:999px; white-space:nowrap;
}
.badge .icon{width:13px;height:13px;}
.dept-chip{display:inline-flex; align-items:center; gap:6px; font-size:12px; font-weight:600; padding:3px 9px; border-radius:999px;}
.dept-dot{width:8px; height:8px; border-radius:50%; flex:none;}

.btn{
  height:38px; padding:0 16px; border-radius:var(--radius-sm); font-size:13.5px; font-weight:600; cursor:pointer;
  display:inline-flex; align-items:center; gap:7px; border:1px solid var(--border); background:#fff; color:var(--text);
  transition:background .15s, border-color .15s;
}
.btn:hover{background:var(--bg);}
.btn-primary{background:var(--red); border-color:var(--red); color:#fff;}
.btn-primary:hover{background:var(--red-hover); border-color:var(--red-hover);}
.btn-sm{height:32px; padding:0 12px; font-size:12.5px;}
.btn-ghost{border-color:transparent; background:none;}
.btn-ghost:hover{background:var(--bg);}
.btn[disabled]{opacity:.5; cursor:not-allowed;}
.btn-danger-outline{border-color:var(--red); color:var(--red);}
.btn-danger-outline:hover{background:var(--red-bg);}

/* Tooltip */
.tt-trigger{display:inline-flex; align-items:center; justify-content:center; width:16px; height:16px; border-radius:50%;
  background:var(--gray-bg); color:var(--text2); font-size:10.5px; font-weight:700; cursor:help; border:none; margin-left:4px;}
.tooltip-pop{
  position:fixed; z-index:200; max-width:260px; background:#1D1F23; color:#fff; font-size:12.5px; line-height:1.45;
  padding:8px 11px; border-radius:8px; box-shadow:var(--shadow-lg); display:none;
}
.tooltip-pop.show{display:block;}

/* Progress bar */
.pbar{height:8px; background:var(--gray-bg); border-radius:6px; overflow:hidden; position:relative;}
.pbar > div{height:100%; background:var(--red); border-radius:6px; transition:width .25s;}
.pbar.blue > div{background:var(--blue);} .pbar.green > div{background:var(--green);}

/* Model header (overview) */
.model-header{padding:20px; margin-bottom:16px;}
.mh-top{display:flex; align-items:center; justify-content:space-between; gap:16px; flex-wrap:wrap;}
.mh-title{font-size:22px; font-weight:800;}
.mh-meta{display:flex; gap:18px; flex-wrap:wrap; margin-top:10px; font-size:13px; color:var(--text2);}
.mh-meta b{color:var(--text); font-weight:600;}

.stage-rail{display:flex; align-items:stretch; gap:6px; margin-top:18px; overflow-x:auto; padding-bottom:4px;}
.stage-pill{
  flex:1; min-width:120px; border:1px solid var(--border); border-radius:10px; padding:10px 12px; cursor:pointer;
  background:#fff; position:relative; transition:box-shadow .15s;
}
.stage-pill:hover{box-shadow:var(--shadow);}
.stage-pill.done{background:var(--green-bg); border-color:#B7EFCB;}
.stage-pill.current{background:var(--red-bg); border-color:#FDA29B;}
.stage-pill.blocked{background:var(--gray-bg);}
.stage-pill .sp-idx{font-size:11px; color:var(--text2); font-weight:700;}
.stage-pill .sp-name{font-size:12.5px; font-weight:700; margin-top:2px;}
.stage-pill .sp-tag{font-size:10.5px; margin-top:5px; font-weight:600;}
.stage-pill .sp-here{position:absolute; top:-9px; right:8px; background:var(--red); color:#fff; font-size:9.5px; font-weight:700; padding:2px 6px; border-radius:6px;}

/* Popover for stage rail */
.popover{
  position:fixed; z-index:150; width:280px; background:#fff; border:1px solid var(--border); border-radius:var(--radius);
  box-shadow:var(--shadow-lg); padding:14px; display:none;
}
.popover.show{display:block;}
.popover h4{font-size:14px; margin-bottom:8px;}
.popover .pv-row{display:flex; justify-content:space-between; font-size:12.5px; margin-bottom:6px; color:var(--text2);}
.popover .pv-row b{color:var(--text);}

/* Attention list */
.attn-item{display:flex; gap:12px; padding:13px 0; border-bottom:1px solid var(--border);}
.attn-item:last-child{border-bottom:none;}
.attn-ic{width:34px; height:34px; border-radius:9px; background:var(--red-bg); color:var(--red); display:flex; align-items:center; justify-content:center; flex:none;}
.attn-body{flex:1; min-width:0;}
.attn-title{font-weight:600; font-size:13.5px;}
.attn-detail{font-size:12.5px; color:var(--text2); margin-top:3px;}
.attn-detail span{color:var(--text); font-weight:600;}

/* Dept progress rows */
.dept-row{display:flex; align-items:center; gap:12px; padding:9px 0; cursor:pointer; border-radius:8px;}
.dept-row:hover{background:var(--bg);}
.dept-row .dr-name{width:190px; font-size:13px; font-weight:600; display:flex; align-items:center; gap:8px;}
.dept-row .dr-bar{flex:1;}
.dept-row .dr-num{width:60px; text-align:right; font-size:12.5px; color:var(--text2); font-weight:600;}

/* Events list (mini) */
.mini-event{display:flex; gap:10px; padding:10px 0; border-bottom:1px solid var(--border); font-size:13px;}
.mini-event:last-child{border-bottom:none;}
.me-date{width:80px; flex:none; color:var(--text2); font-weight:600; font-size:12.5px;}
.me-ic{width:26px;height:26px;border-radius:7px;display:flex;align-items:center;justify-content:center;flex:none;}

/* Founder dashboard timeline */
.mtimeline{overflow-x:auto;}
.mtl-row{display:flex; align-items:center; border-bottom:1px solid var(--border); min-height:56px;}
.mtl-row:last-child{border-bottom:none;}
.mtl-label{width:170px; flex:none; font-size:13px; font-weight:700; padding-right:10px;}
.mtl-track{flex:1; position:relative; height:34px; min-width:640px; background:var(--gray-bg); border-radius:8px;}
.mtl-bar{position:absolute; top:6px; height:22px; border-radius:6px; display:flex; align-items:center; padding:0 8px; font-size:11px; font-weight:700; color:#fff; white-space:nowrap; overflow:hidden;}
.mtl-dot{position:absolute; top:9px; width:16px; height:16px; border-radius:50%; border:3px solid #fff; box-shadow:0 0 0 1px var(--border); transform:translateX(-50%); cursor:pointer;}
.mtl-today{position:absolute; top:-4px; bottom:-4px; width:2px; background:var(--red); z-index:5;}
.mtl-today-label{position:absolute; top:-22px; transform:translateX(-50%); font-size:11px; font-weight:700; color:var(--red); white-space:nowrap;}
.mtl-wrap{position:relative; padding-top:22px;}

/* Approval queue item */
.appr-item{border:1px solid var(--border); border-radius:12px; padding:14px; margin-bottom:10px; position:relative;}
.appr-item.critical{border-color:#FDA29B; background:var(--red-bg);}
.appr-top{display:flex; justify-content:space-between; gap:10px; align-items:flex-start;}
.appr-title{font-weight:700; font-size:14.5px;}
.appr-meta{font-size:12.5px; color:var(--text2); margin-top:5px; line-height:1.6;}
.appr-actions{display:flex; gap:8px; margin-top:12px; flex-wrap:wrap;}

/* Kanban-ish task groups */
.tgroup{margin-bottom:14px;}
.tgroup-head{display:flex; align-items:center; gap:8px; cursor:pointer; padding:10px 4px; user-select:none;}
.tgroup-head .chev{transition:transform .15s;}
.tgroup-head.collapsed .chev{transform:rotate(-90deg);}
.tgroup-title{font-weight:700; font-size:14.5px;}
.tgroup-count{background:var(--gray-bg); color:var(--text2); font-size:11.5px; font-weight:700; padding:2px 8px; border-radius:10px;}
.tgroup-body{display:flex; flex-direction:column; gap:8px;}
.tgroup-body.collapsed{display:none;}

.task-card{border:1px solid var(--border); border-radius:12px; padding:13px 14px; background:#fff; cursor:pointer; transition:box-shadow .15s;}
.task-card:hover{box-shadow:var(--shadow);}
.tc-top{display:flex; justify-content:space-between; gap:10px; align-items:flex-start;}
.tc-title{font-weight:600; font-size:13.5px;}
.tc-meta{display:flex; gap:8px; flex-wrap:wrap; margin-top:7px; font-size:12px; color:var(--text2);}
.tc-badges{display:flex; gap:6px; flex-wrap:wrap; margin-top:8px;}
.tc-foot{display:flex; justify-content:space-between; align-items:center; margin-top:10px; gap:8px;}
.tc-actions{display:flex; gap:6px;}
.tc-progress-mini{font-size:11.5px; color:var(--text2); display:flex; align-items:center; gap:6px;}

/* Locked field */
.locked-field{display:flex; align-items:center; gap:6px; color:var(--text2); font-size:12.5px; background:var(--gray-bg); padding:4px 9px; border-radius:7px; cursor:help;}

/* Filter bar */
.filterbar{display:flex; gap:8px; flex-wrap:wrap; align-items:center; margin-bottom:16px;}
.filterbar select, .filterbar .chip-toggle{
  height:34px; border:1px solid var(--border); border-radius:8px; background:#fff; font-size:12.5px; padding:0 10px; cursor:pointer;
}
.chip-toggle{display:flex; align-items:center; gap:6px; font-weight:600; color:var(--text2);}
.chip-toggle.active{background:var(--red-bg); border-color:#FDA29B; color:var(--red);}
.filter-result-count{font-size:12.5px; color:var(--text2); margin-left:auto;}

/* Stage cards (production path) */
.stage-card{margin-bottom:12px; overflow:hidden;}
.stage-card-head{display:flex; align-items:center; gap:14px; padding:16px; cursor:pointer;}
.stage-card-num{width:34px; height:34px; border-radius:10px; background:var(--gray-bg); color:var(--text2); font-weight:800; font-size:14px; display:flex; align-items:center; justify-content:center; flex:none;}
.stage-card.done .stage-card-num{background:var(--green-bg); color:var(--green);}
.stage-card.current .stage-card-num{background:var(--red-bg); color:var(--red);}
.stage-card-main{flex:1; min-width:0;}
.stage-card-title{font-weight:700; font-size:15px; display:flex; align-items:center; gap:8px; flex-wrap:wrap;}
.stage-card-sub{font-size:12.5px; color:var(--text2); margin-top:4px; display:flex; gap:14px; flex-wrap:wrap;}
.stage-card-progress{width:150px; flex:none;}
.stage-card-chev{flex:none; color:var(--text2); transition:transform .15s;}
.stage-card.open .stage-card-chev{transform:rotate(180deg);}
.stage-card-body{display:none; border-top:1px solid var(--border); padding:16px;}
.stage-card.open .stage-card-body{display:block;}
.you-here-tag{background:var(--red); color:#fff; font-size:10.5px; font-weight:700; padding:3px 8px; border-radius:7px;}
.locked-tag{display:flex; align-items:center; gap:6px; color:var(--text2); font-size:12.5px;}

.io-cols{display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-bottom:16px;}
.io-box{border:1px solid var(--border); border-radius:10px; padding:12px;}
.io-box h5{font-size:12px; text-transform:uppercase; letter-spacing:.3px; color:var(--text2); margin-bottom:8px;}
.io-box ul{margin:0; padding-left:18px; font-size:13px;}
.io-box li{margin-bottom:4px;}

.approved-block{background:var(--green-bg); border:1px solid #B7EFCB; border-radius:10px; padding:14px; margin-top:14px;}
.approved-block .ab-title{color:var(--green); font-weight:700; font-size:13.5px; display:flex; align-items:center; gap:6px;}

.file-row{display:flex; align-items:center; gap:10px; padding:9px 0; border-bottom:1px solid var(--border);}
.file-row:last-child{border-bottom:none;}
.file-ic{width:32px; height:32px; border-radius:8px; background:var(--blue-bg); color:var(--blue); display:flex; align-items:center; justify-content:center; flex:none;}
.file-meta{flex:1; min-width:0;}
.file-name{font-weight:600; font-size:13px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
.file-sub{font-size:11.5px; color:var(--text2); margin-top:2px;}
.file-actions{display:flex; gap:4px;}

/* Gantt */
.gantt-wrap{display:flex; border:1px solid var(--border); border-radius:var(--radius); overflow:hidden; background:#fff;}
.gantt-left{width:190px; flex:none; border-right:1px solid var(--border);}
.gantt-left-head{height:44px; border-bottom:1px solid var(--border); display:flex; align-items:center; padding:0 12px; font-size:11.5px; font-weight:700; color:var(--text2); background:var(--bg);}
.gantt-dept-row{height:40px; display:flex; align-items:center; padding:0 12px; font-size:12.5px; font-weight:600; border-bottom:1px solid var(--border); gap:8px; cursor:pointer;}
.gantt-right{flex:1; overflow-x:auto; position:relative;}
.gantt-scale{height:44px; border-bottom:1px solid var(--border); display:flex; background:var(--bg); position:sticky; top:0; z-index:2; min-width:900px;}
.gantt-scale div{flex:1; display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:700; color:var(--text2); border-right:1px solid var(--border);}
.gantt-body{position:relative; min-width:900px;}
.gantt-row{height:40px; border-bottom:1px solid var(--border); position:relative;}
.gantt-task{position:absolute; top:7px; height:26px; border-radius:6px; font-size:11px; color:#fff; display:flex; align-items:center; padding:0 8px; white-space:nowrap; overflow:hidden; cursor:pointer; font-weight:600;}
.gantt-today-line{position:absolute; top:0; bottom:0; width:2px; background:var(--red); z-index:3;}

/* Calendar */
.cal-head{display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; flex-wrap:wrap; gap:10px;}
.cal-nav{display:flex; align-items:center; gap:6px;}
.cal-period{font-size:16px; font-weight:700; min-width:150px; text-align:center;}
.cal-views{display:flex; gap:4px; background:var(--gray-bg); border-radius:9px; padding:3px;}
.cal-view-btn{border:none; background:none; padding:6px 12px; font-size:12.5px; font-weight:600; border-radius:7px; cursor:pointer; color:var(--text2);}
.cal-view-btn.active{background:#fff; color:var(--text); box-shadow:var(--shadow);}
.cal-grid{display:grid; grid-template-columns:repeat(7,1fr); border:1px solid var(--border); border-radius:var(--radius); overflow:hidden;}
.cal-dow{background:var(--bg); text-align:center; font-size:11.5px; font-weight:700; color:var(--text2); padding:8px 0; border-bottom:1px solid var(--border);}
.cal-cell{min-height:98px; border-right:1px solid var(--border); border-bottom:1px solid var(--border); padding:6px; position:relative;}
.cal-cell:nth-child(7n){border-right:none;}
.cal-cell.other{background:#FAFAFB; color:#C0C5CD;}
.cal-cell.today{background:var(--red-bg);}
.cal-daynum{font-size:12px; font-weight:700; margin-bottom:4px;}
.cal-cell.today .cal-daynum{color:var(--red);}
.cal-ev{font-size:10.5px; font-weight:600; padding:2px 5px; border-radius:5px; margin-bottom:3px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; cursor:pointer; display:flex; align-items:center; gap:3px;}
.cal-more{font-size:10.5px; color:var(--text2); font-weight:700; cursor:pointer; padding:2px 5px;}
.cal-week-grid{display:grid; grid-template-columns:70px repeat(7,1fr); border:1px solid var(--border); border-radius:var(--radius); overflow:hidden;}
.cal-list-day{margin-bottom:16px;}
.cal-list-daylabel{font-size:13px; font-weight:700; margin-bottom:8px; padding-bottom:6px; border-bottom:1px solid var(--border);}
.cal-list-item{display:flex; gap:10px; align-items:center; padding:9px 10px; border-radius:9px; cursor:pointer;}
.cal-list-item:hover{background:var(--bg);}

/* Handoffs */
.handoff-flow{display:flex; align-items:center; gap:8px; overflow-x:auto; padding:16px; margin-bottom:18px;}
.hf-node{background:var(--bg); border:1px solid var(--border); border-radius:9px; padding:8px 12px; font-size:12.5px; font-weight:700; white-space:nowrap;}
.hf-arrow{color:var(--text2); flex:none;}
.handoff-card{margin-bottom:14px; padding:16px;}
.handoff-title-row{display:flex; justify-content:space-between; align-items:flex-start; gap:12px; flex-wrap:wrap;}
.hf-route{font-size:12px; color:var(--text2); font-weight:700; text-transform:uppercase; letter-spacing:.3px; display:flex; align-items:center; gap:6px;}
.hf-materials{margin-top:12px; display:grid; grid-template-columns:repeat(2,1fr); gap:6px 16px;}
.hf-mat{display:flex; align-items:center; gap:7px; font-size:12.5px;}
.hf-mat.missing{color:var(--red); font-weight:600;}
.hf-mat .mdot{width:16px; height:16px; border-radius:50%; display:flex; align-items:center; justify-content:center; flex:none; font-size:10px;}
.hf-mat.done .mdot{background:var(--green-bg); color:var(--green);}
.hf-mat.missing .mdot{background:var(--red-bg); color:var(--red);}

/* Drawer */
#drawer-overlay{position:fixed; inset:0; background:rgba(16,24,40,.45); z-index:100; display:none;}
#drawer-overlay.show{display:block;}
#drawer{
  position:fixed; top:0; right:-560px; width:540px; max-width:92vw; height:100vh; background:#fff; z-index:101;
  box-shadow:-8px 0 24px rgba(16,24,40,.15); transition:right .22s ease; display:flex; flex-direction:column;
}
#drawer.show{right:0;}
.drawer-head{padding:18px 20px; border-bottom:1px solid var(--border);}
.drawer-head-top{display:flex; justify-content:space-between; align-items:flex-start; gap:10px;}
.drawer-id{font-size:11.5px; color:var(--text2); font-weight:700;}
.drawer-title{font-size:17px; font-weight:700; margin-top:3px;}
.drawer-close{border:none; background:none; cursor:pointer; color:var(--text2); width:32px; height:32px; border-radius:8px; display:flex; align-items:center; justify-content:center;}
.drawer-close:hover{background:var(--bg);}
.drawer-badges{display:flex; gap:6px; flex-wrap:wrap; margin-top:10px;}
.drawer-tabs{display:flex; gap:2px; padding:0 20px; border-bottom:1px solid var(--border);}
.dtab-btn{border:none; background:none; padding:11px 12px; font-size:12.5px; font-weight:600; color:var(--text2); cursor:pointer; border-bottom:2px solid transparent;}
.dtab-btn.active{color:var(--red); border-bottom-color:var(--red);}
.drawer-body{flex:1; overflow-y:auto; padding:20px;}
.drawer-foot{padding:14px 20px; border-top:1px solid var(--border); display:flex; gap:8px; flex-wrap:wrap;}
.dinfo-row{margin-bottom:14px;}
.dinfo-row h5{font-size:11.5px; text-transform:uppercase; color:var(--text2); letter-spacing:.3px; margin-bottom:6px;}
.dinfo-row p{font-size:13.5px;}
.checklist-item{display:flex; align-items:center; gap:9px; padding:7px 0; font-size:13.5px;}
.checklist-item input{width:16px; height:16px; cursor:pointer;}
.checklist-item.done label{text-decoration:line-through; color:var(--text2);}
.comment-item{padding:10px 0; border-bottom:1px solid var(--border);}
.comment-item:last-child{border-bottom:none;}
.comment-author{font-weight:700; font-size:13px;}
.comment-time{font-size:11.5px; color:var(--text2); margin-left:6px; font-weight:400;}
.comment-text{font-size:13px; margin-top:3px;}
.comment-input{display:flex; gap:8px; margin-top:12px;}
.comment-input textarea{flex:1; border:1px solid var(--border); border-radius:9px; padding:9px; font-size:13px; font-family:inherit; resize:vertical; min-height:38px;}
.history-item{display:flex; gap:10px; padding:9px 0; font-size:12.5px;}
.history-dot{width:8px;height:8px;border-radius:50%;background:var(--blue); margin-top:5px; flex:none;}
.history-time{color:var(--text2); width:110px; flex:none;}

/* Modal */
#modal-overlay{position:fixed; inset:0; background:rgba(16,24,40,.45); z-index:120; display:none; align-items:center; justify-content:center;}
#modal-overlay.show{display:flex;}
.modal-box{background:#fff; border-radius:var(--radius); width:480px; max-width:92vw; max-height:88vh; overflow-y:auto; box-shadow:var(--shadow-lg);}
.modal-head{padding:18px 20px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center;}
.modal-head h3{font-size:16px;}
.modal-body{padding:20px;}
.modal-foot{padding:14px 20px; border-top:1px solid var(--border); display:flex; justify-content:flex-end; gap:8px;}
.form-row{margin-bottom:14px;}
.form-row label{display:block; font-size:12.5px; font-weight:600; margin-bottom:6px; color:var(--text2);}
.form-row input[type=text], .form-row input[type=date], .form-row select, .form-row textarea{
  width:100%; height:38px; border:1px solid var(--border); border-radius:8px; padding:0 10px; font-size:13.5px; font-family:inherit;
}
.form-row textarea{height:80px; padding:9px 10px; resize:vertical;}
.form-row .req{color:var(--red);}
.form-check{display:flex; align-items:center; gap:8px; font-size:13px;}
.file-input-btn{border:1px dashed var(--border); border-radius:9px; padding:14px; text-align:center; cursor:pointer; font-size:13px; color:var(--text2); position:relative;}
.file-input-btn input{position:absolute; inset:0; opacity:0; cursor:pointer;}
.file-input-btn:hover{border-color:var(--red);}

/* Toasts */
#toast-root{position:fixed; top:70px; right:20px; z-index:300; display:flex; flex-direction:column; gap:8px;}
.toast{
  min-width:280px; max-width:360px; background:#1D1F23; color:#fff; border-radius:10px; padding:12px 14px; display:flex; align-items:flex-start;
  gap:10px; box-shadow:var(--shadow-lg); animation:toastin .2s ease;
}
.toast.success{background:#1D1F23; border-left:4px solid var(--green);}
.toast.warn{background:#1D1F23; border-left:4px solid var(--amber);}
.toast.error{background:#1D1F23; border-left:4px solid var(--red);}
.toast-text{font-size:13px; flex:1;}
.toast-close{background:none; border:none; color:#9AA1AC; cursor:pointer; flex:none;}
@keyframes toastin{from{opacity:0; transform:translateX(20px);} to{opacity:1; transform:translateX(0);}}

/* Tour */
#tour-layer{position:fixed; inset:0; z-index:400; display:none; pointer-events:none;}
#tour-layer.show{display:block;}
#tour-dim{position:fixed; inset:0; background:rgba(16,24,40,.55); pointer-events:auto;}
#tour-box{
  position:fixed; width:300px; background:#fff; border-radius:var(--radius); box-shadow:var(--shadow-lg); padding:16px; pointer-events:auto; z-index:401;
}
#tour-box .tour-step{font-size:11px; font-weight:700; color:var(--red); margin-bottom:6px;}
#tour-box h4{font-size:15px; margin-bottom:6px;}
#tour-box p{font-size:13px; color:var(--text2); margin-bottom:14px;}
.tour-foot{display:flex; justify-content:space-between; align-items:center;}
#tour-highlight{position:fixed; border-radius:10px; box-shadow:0 0 0 4px #fff, 0 0 0 6px var(--red); z-index:399; pointer-events:none; transition:all .2s;}

.empty-state{text-align:center; padding:40px 20px; color:var(--text2);}
.hidden{display:none !important;}
.lock-note{font-size:11.5px; color:var(--text2); display:flex; align-items:center; gap:5px; margin-top:6px;}

@media (max-width:1180px){
  .grid-4{grid-template-columns:repeat(2,1fr);}
  #app{min-width:0;}
  main#main-content{padding:16px;}
  #drawer{width:100vw;}
}
</style>
</head>

function fmtDate(iso, opts={day:'numeric',month:'long'}){ if(!iso) return ''; const d=new Date(iso); return d.toLocaleDateString('ru-RU', opts); }
function findTask(id){ return DB.tasks.find(t=>t.id===id); }
function findModel(id){ return MODELS_DEFAULT.find(m=>m.id===id); }
function findStage(id){ return DB.stages.find(s=>s.id===id); }
function deptChip(deptKey){ const d=DEPARTMENTS[deptKey]; if(!d) return ''; return `<span class="dept-chip" style="background:${d.bg};color:${d.color}"><span class="dept-dot" style="background:${d.color}"></span>${d.name}</span>`; }
function statusBadge(map,key){ const s=map[key]; if(!s) return ''; return `<span class="badge" style="background:${s.bg};color:${s.color}">${ic(s.icon,13)}${s.label}</span>`; }
function forecastBadge(key){ const f=FORECAST[key]; return `<span class="badge" style="background:${f.bg};color:${f.color}">${f.label}</span>`; }
function priorityBadge(key){ const p=PRIORITY[key]; return `<span class="badge" style="background:${p.color}18;color:${p.color}">${p.label}</span>`; }
function esc(s){ return (s||'').replace(/[&<>]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }

function toast(text, type='success'){
  const root=document.getElementById('toast-root');
  const el=document.createElement('div');
  el.className='toast '+type;
  const iconName = type==='success'?'check':type==='warn'?'alertTriangle':'alertCircle';
  el.innerHTML = `${ic(iconName,17)}<div class="toast-text">${esc(text)}</div><button class="toast-close" aria-label="Закрыть уведомление">${ic('x',14)}</button>`;
  el.querySelector('.toast-close').onclick=()=>el.remove();
  root.appendChild(el);
  setTimeout(()=>{ el.style.transition='opacity .3s'; el.style.opacity='0'; setTimeout(()=>el.remove(),300); }, 3800);
}

const TOOLTIP_TEXT = {
  progress:'Общий прогресс — доля выполненных задач модели от общего количества задач производственного пути.',
  forecast:'Прогнозная дата запуска рассчитывается автоматически на основе текущих задержек и блокеров.',
  blocker:'Блокирующая зависимость — задача или материал, без которых следующий процесс не может начаться.',
  input:'Входной результат — материалы и файлы, которые должны быть получены от предыдущего отдела для начала работы.',
  output:'Выходной результат — материалы, которые должны быть переданы следующему отделу после завершения этапа.',
  handoff:'Передача — формальный переход результата работы от одного отдела к другому с обязательным согласованием.',
  approver:'Согласующий — сотрудник, который принимает решение об утверждении результата.',
  required:'Обязательный материал — без него передача результата не может считаться завершённой.',
  checkpoint:'Контрольная точка — ключевое событие производственного пути, влияющее на сроки запуска.',
  approvalStatus:'Статус согласования отделён от статуса выполнения задачи: работа может быть выполнена, но ещё не согласована.',
};
function ttHtml(key){ return ` <button type="button" class="tt-trigger" data-tt="${key}" aria-label="Подсказка: ${esc(TOOLTIP_TEXT[key]||'')}" role="button">?</button>`; }
function bindTooltips(){
  const pop=document.getElementById('tooltipPop');
  document.querySelectorAll('[data-tt]').forEach(el=>{
    const show=()=>{
      const txt=TOOLTIP_TEXT[el.dataset.tt]; if(!txt) return;
      pop.textContent=txt; pop.classList.add('show');
      const r=el.getBoundingClientRect();
      let top=r.top-8-pop.offsetHeight, left=r.left+r.width/2-130;
      if(top<10) top=r.bottom+8;
      left=Math.max(10,Math.min(left, window.innerWidth-270));
      pop.style.top=top+'px'; pop.style.left=left+'px';
    };
    const hide=()=>pop.classList.remove('show');
    el.addEventListener('mouseenter',show); el.addEventListener('mouseleave',hide);
    el.addEventListener('focus',show); el.addEventListener('blur',hide);
    el.addEventListener('click',(e)=>{ e.stopPropagation(); show(); });
  });
}
document.addEventListener('keydown', e=>{ if(e.key==='Escape'){ document.getElementById('tooltipPop').classList.remove('show'); } });

function timelineRow(m){
  // scale: 1 июля .. 30 сентября => 92 days
  const start=new Date(2026,6,1), end=new Date(2026,8,30);
  const totalDays=(end-start)/86400000;
  function pos(dateStr){ const d=new Date(dateStr); return Math.max(0,Math.min(100,((d-start)/86400000/totalDays)*100)); }
  const stageColor = m.forecast==='risk'?'#D92D20':m.forecast==='attention'?'#DC6803':'#2563EB';
  const barStart=pos('2026-07-01'), barEnd=pos(m.launchPlanned);
  const milestones=[];
  if(m.id==='dk5700'){ milestones.push({label:'Образец',date:'2026-08-12'},{label:'Съёмка',date:'2026-08-14'},{label:'Продажи',date:'2026-09-05'}); }

  if(m.id==='dk5000'){ milestones.push({label:'Образец',date:'2026-08-18'}); }
  milestones.push({label:'Запуск',date:m.launchPlanned});
  return `<div class="mtl-row">
    <div class="mtl-label">${esc(m.short)}</div>
    <div class="mtl-track">
      <div class="mtl-bar" style="left:${barStart}%; width:${Math.max(4,barEnd-barStart)}%; background:${stageColor};">${esc(m.stageName)}</div>
      ${milestones.map(ms=>`<div class="mtl-dot" title="${esc(ms.label)} — ${fmtDate(ms.date)}" style="left:${pos(ms.date)}%; background:${stageColor};" data-action="openModel" data-id="${m.id}"></div>`).join('')}

}

function openStagePopover(modelId, idx, target){
  const model=findModel(modelId);
  const stage = modelId==='dk5700' ? DB.stages[idx] : null;
  const pop=document.getElementById('stagePopover');
  let html;
  if(stage){
    const apKey = stage.approvalStatus==='partial' ? 'in_review' : stage.approvalStatus;
    html = `<h4>${esc(stage.name)}</h4>
      <div class="pv-row"><span>Период</span><b>${esc(stage.period)}</b></div>
      <div class="pv-row"><span>Статус</span><b>${esc(stage.statusLabel)}</b></div>
      <div class="pv-row"><span>Отдел</span><b>${stage.departments.map(d=>DEPARTMENTS[d].name).join(', ')}</b></div>
      <div class="pv-row"><span>Задач</span><b>${stage.tasksCount}</b></div>
      <div class="pv-row"><span>Материалов</span><b>${stage.filesCount}</b></div>
      <div class="pv-row"><span>Согласование</span><b>${APPROVAL_STATUS[apKey].label}</b></div>
      <div class="pv-row"><span>Зависимость</span><b style="text-align:right;">${esc(stage.blockedReason||'—')}</b></div>
      <button class="btn btn-sm" style="width:100%;justify-content:center;margin-top:8px;" data-action="openStageFromPopover" data-idx="${idx}">Открыть этап</button>`;
  } else {
    html = `<h4>${STAGE_NAMES[idx]}</h4><div class="pv-row"><span>Модель</span><b>${esc(model.short)}</b></div><div class="pv-row"><span>Текущий этап</span><b>${esc(model.stageName)}</b></div><button class="btn btn-sm" style="width:100%;justify-content:center;margin-top:8px;" data-action="openModel" data-id="${modelId}">Открыть модель</button>`;
  }
  pop.innerHTML = html;
  const r = target.getBoundingClientRect();
  let left = Math.min(window.innerWidth-296, Math.max(10, r.left));
  let top = r.bottom + 8;
  if(top + 260 > window.innerHeight) top = Math.max(10, r.top - 268);
  pop.style.left = left+'px'; pop.style.top = top+'px';
  pop.classList.add('show');
  bindTooltips();
  setTimeout(()=>document.addEventListener('click', closePopoverOnOutsideClick), 0);
}
function closePopoverOnOutsideClick(e){
  const pop=document.getElementById('stagePopover');
  if(!pop.contains(e.target)){ pop.classList.remove('show'); document.removeEventListener('click', closePopoverOnOutsideClick); }
}
function openStageFromPopover(idx){
  document.getElementById('stagePopover').classList.remove('show');
  const stage = DB.stages[idx];
  DB.ui.tab='path'; UI.pathView='stages'; if(stage) UI.openStages[stage.id]=true;
  rerenderAll();
  if(stage) setTimeout(()=>document.getElementById('stagecard-'+stage.id)?.scrollIntoView({behavior:'smooth', block:'start'}), 60);
}

function filterPathTasks(tasks){
  const f=UI.pathFilters;
  return tasks.filter(t=>{
    if(f.department!=='all' && t.department!==f.department) return false;
    if(f.assignee!=='all' && t.assignee!==f.assignee) return false;
    if(f.status!=='all' && t.status!==f.status) return false;
    if(f.approval!=='all' && t.approvalStatus!==f.approval) return false;
    if(f.overdueOnly && t.status!=='overdue') return false;
    if(f.blockedOnly && t.status!=='blocked') return false;
    if(f.hideCompleted && t.status==='done') return false;
    if(f.period && f.period!=='all'){
      const mo = t.startDate.slice(0,7);
      if(f.period==='jul' && mo!=='2026-07') return false;
      if(f.period==='aug' && mo!=='2026-08') return false;
      if(f.period==='sep' && mo!=='2026-09') return false;
    }
    return true;
  });
}

function renderGantt(model){
  const depts=Object.keys(DEPARTMENTS);
  const scaleStart=new Date(2026,6,1), scaleEnd=new Date(2026,8,30);
  const totalDays=(scaleEnd-scaleStart)/86400000;
  function pos(dstr){ return Math.max(0,Math.min(100,((new Date(dstr)-scaleStart)/86400000/totalDays)*100)); }
  const todayPos=pos('2026-07-16');
  const rows=depts.map(dk=>{
    const tasks=DB.tasks.filter(t=>t.project===model.id && t.department===dk);
    if(!tasks.length) return null;
    const collapsed=!!UI.ganttCollapsed[dk];
    const rowH=collapsed?40:Math.max(40,tasks.length*30+10);
    const bars=collapsed?'':tasks.map((t,i)=>{
      const left=pos(t.startDate), right=pos(t.dueDate.split('T')[0]);
      return `<div class="gantt-task" data-action="openTask" data-id="${t.id}" style="left:${left}%;width:${Math.max(3,right-left)}%;top:${i*30+7}px;background:${TASK_STATUS[t.status].color};" title="${esc(t.title)}">${esc(t.title)}</div>`;
    }).join('');
    return {dk,tasks,collapsed,rowH,bars};
  }).filter(Boolean);
  const scaleLabels = UI.ganttScale==='weeks' ? [...Array(13)].map((_,i)=>'Н'+(i+1)) : ['Июль','Август','Сентябрь'];
  return `<div style="margin-bottom:10px;display:flex;justify-content:flex-end;gap:6px;">
    <button class="btn btn-sm" data-action="calToday">${ic('calendar',13)}Сегодня</button>
    <div class="cal-views"><button class="cal-view-btn ${UI.ganttScale!=='weeks'?'active':''}" data-action="setGanttScale" data-scale="months">Месяцы</button><button class="cal-view-btn ${UI.ganttScale==='weeks'?'active':''}" data-action="setGanttScale" data-scale="weeks">Недели</button></div>
  </div>
  <div class="gantt-wrap">
    <div class="gantt-left">
      <div class="gantt-left-head">Отдел</div>
      ${rows.map(r=>`<div class="gantt-dept-row" style="height:${r.collapsed?40:r.rowH}px;" data-action="toggleGanttDept" data-dept="${r.dk}">${ic(r.collapsed?'chevRight':'chevDown',14)} ${DEPARTMENTS[r.dk].name} <span style="color:var(--text2);font-weight:400;">(${r.tasks.length})</span></div>`).join('')}
    </div>
    <div class="gantt-right">
      <div class="gantt-scale">${scaleLabels.map(l=>`<div>${l}</div>`).join('')}</div>
      <div class="gantt-body">
        <div class="gantt-today-line" style="left:${todayPos}%;"></div>
        ${rows.map(r=>`<div class="gantt-row" style="height:${r.collapsed?40:r.rowH}px;">${r.bars}</div>`).join('')}
      </div>
    </div>
  </div>`;
}

function groupMyTasks(list){
  const used=new Set();
  const pick=(pred)=>{ const arr=list.filter(t=>!used.has(t.id)&&pred(t)); arr.forEach(t=>used.add(t.id)); return arr; };
  const action = pick(t=>t.status==='overdue' || (t.approvalStatus==='not_sent' && (t.priority==='critical'||t.priority==='high') && t.status!=='done' && t.status!=='blocked' && t.status!=='not_started'));
  const review = pick(t=>t.approvalStatus==='in_review');
  const waiting = pick(t=>t.status==='blocked');
  const progress = pick(t=>t.status==='in_progress'||t.status==='ready');
  const done = pick(t=>t.status==='done');
  const other = list.filter(t=>!used.has(t.id));
  return [
    {key:'action', title:'Требуют действия', items:action},
    {key:'progress', title:'В работе', items:progress},
    {key:'waiting', title:'Ожидают другой отдел', items:waiting},
    {key:'review', title:'На согласовании', items:review},
    {key:'done', title:'Выполнено', items:done},
    {key:'other', title:'Остальное', items:other},
  ].filter(g=>g.items.length);
}
function applyMyWorkFilter(list){
  const f=UI.myWorkFilters.scope;
  if(f==='today') return list.filter(t=>t.dueDate.startsWith('2026-07-16'));
  if(f==='week') return list.filter(t=>{ const d=new Date(t.dueDate.split('T')[0]); return d>=TODAY && d<=new Date(2026,6,23); });
  if(f==='overdue') return list.filter(t=>t.status==='overdue');
  if(f==='review') return list.filter(t=>t.approvalStatus==='in_review');
  if(f==='revision') return list.filter(t=>t.approvalStatus==='needs_revision');
  if(f==='blocked') return list.filter(t=>t.status==='blocked');
  if(f==='done') return list.filter(t=>t.status==='done');
  return list;
}

function applyCalFilters(events){
  const f=UI.calFilters;
  return events.filter(e=>{
    if(f.model!=='all' && e.project!==f.model) return false;
    if(f.department!=='all' && e.department!==f.department) return false;
    if(f.type!=='all' && e.type!==f.type) return false;
    if(f.status!=='all' && e.status!==f.status) return false;
    if(f.critical && !e.critical) return false;
    if(f.mine && e.assignee.indexOf('Екатерина')!==0) return false;
    if(f.approvalsOnly && e.type!=='approval') return false;
    if(f.handoffsOnly && e.type!=='handoff') return false;

  });
}
function startOfWeek(d){ const x=new Date(d); const day=(x.getDay()+6)%7; x.setDate(x.getDate()-day); return x; }
function isSameDay(a,b){ return a.getFullYear()===b.getFullYear()&&a.getMonth()===b.getMonth()&&a.getDate()===b.getDate(); }
function calPeriodLabel(){
  const monthsNom=['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];
  const monthsGen=['января','февраля','марта','апреля','мая','июня','июля','августа','сентября','октября','ноября','декабря'];
  const d=UI.calDate;
  if(UI.calView==='week'){ const s=startOfWeek(d); const e=new Date(s); e.setDate(e.getDate()+6); return s.getDate()+' — '+e.getDate()+' '+monthsGen[e.getMonth()]; }
  return monthsNom[d.getMonth()]+' '+d.getFullYear();
}
function calFilterSelect(key,label,options){
  return `<select data-action="calFilterChange" data-f="${key}" aria-label="${label}">${options.map(([v,l])=>`<option value="${v}" ${UI.calFilters[key]===v?'selected':''}>${l}</option>`).join('')}</select>`;
}
function renderCalMonth(events){
  const d=UI.calDate; const year=d.getFullYear(), month=d.getMonth();
  const firstDay=new Date(year,month,1); const startOffset=(firstDay.getDay()+6)%7;
  const daysInMonth=new Date(year,month+1,0).getDate();
  const prevDays=new Date(year,month,0).getDate();
  const cells=[];
  for(let i=startOffset-1;i>=0;i--) cells.push({day:prevDays-i, other:true, date:new Date(year,month-1,prevDays-i)});
  for(let i=1;i<=daysInMonth;i++) cells.push({day:i, other:false, date:new Date(year,month,i)});
  let nextDay=1;
  while(cells.length<42){ cells.push({day:nextDay, other:true, date:new Date(year,month+1,nextDay)}); nextDay++; }
  const dow=['Пн','Вт','Ср','Чт','Пт','Сб','Вс'];
  const html = cells.map(c=>{
    const dayEvents = events.filter(e=>isSameDay(new Date(e.dateStart), c.date));
    const isToday = isSameDay(c.date, TODAY);
    const shown=dayEvents.slice(0,3); const more=dayEvents.length-shown.length;
    return `<div class="cal-cell ${c.other?'other':''} ${isToday?'today':''}" data-action="openDayList" data-date="${c.date.getFullYear()}-${String(c.date.getMonth()+1).padStart(2,'0')}-${String(c.date.getDate()).padStart(2,'0')}">
      <div class="cal-daynum">${c.day}</div>
      ${shown.map(e=>`<div class="cal-ev" style="background:${EVENT_TYPES[e.type].bg};color:${EVENT_TYPES[e.type].color}" data-action="openEvent" data-id="${e.id}">${ic(EVENT_TYPES[e.type].icon,11)}${esc(e.title)}</div>`).join('')}
      ${more>0?`<div class="cal-more">+ ещё ${more}</div>`:''}
    </div>`;
  }).join('');
  return `<div class="cal-grid">${dow.map(x=>`<div class="cal-dow">${x}</div>`).join('')}${html}</div>`;
}
function renderCalWeek(events){
  const start=startOfWeek(UI.calDate);
  const days=[...Array(7)].map((_,i)=>{ const dd=new Date(start); dd.setDate(dd.getDate()+i); return dd; });
  const dow=['Понедельник','Вторник','Среда','Четверг','Пятница','Суббота','Воскресенье'];
  return `<div class="grid grid-4" style="grid-template-columns:repeat(7,1fr);">
    ${days.map((dd,i)=>{
      const dayEvents=events.filter(e=>isSameDay(new Date(e.dateStart),dd));
      const isToday=isSameDay(dd,TODAY);
      return `<div class="card" style="padding:10px;${isToday?'border-color:#FDA29B;background:var(--red-bg);':''}">
        <div style="font-size:11px;font-weight:700;color:var(--text2);">${dow[i]}</div>
        <div style="font-size:16px;font-weight:800;margin-bottom:8px;${isToday?'color:var(--red)':''}">${dd.getDate()}</div>
        ${dayEvents.length?dayEvents.map(e=>`<div class="cal-ev" style="background:${EVENT_TYPES[e.type].bg};color:${EVENT_TYPES[e.type].color};white-space:normal;margin-bottom:5px;" data-action="openEvent" data-id="${e.id}">${ic(EVENT_TYPES[e.type].icon,11)}${esc(e.title)}</div>`).join(''):'<div style="font-size:11px;color:#C0C5CD;">—</div>'}
      </div>`;
    }).join('')}
  </div>`;
}
function renderCalList(events){
  const sorted=[...events].sort((a,b)=>new Date(a.dateStart)-new Date(b.dateStart));
  const groups={}; sorted.forEach(e=>{ (groups[e.dateStart]=groups[e.dateStart]||[]).push(e); });
  const dates=Object.keys(groups);
  if(!dates.length) return `<div class="empty-state">Нет событий по выбранным фильтрам</div>`;
  return dates.map(dt=>{
    const isToday = dt==='2026-07-16'; const isPast = new Date(dt)<TODAY;
    return `<div class="cal-list-day"><div class="cal-list-daylabel">${fmtDate(dt,{day:'numeric',month:'long',weekday:'long'})}${isToday?' · Сегодня':''}</div>
      ${groups[dt].map(e=>`<div class="cal-list-item" data-action="openEvent" data-id="${e.id}">

  else { const e=DB.events.find(x=>x.id===id); title=e.title; }
  const html=`
    <div class="modal-head"><h3>Отправить на согласование</h3><button class="drawer-close" data-action="closeModal" aria-label="Закрыть">${ic('x',18)}</button></div>

      <div class="form-row"><label>Согласующий <span class="req">*</span></label><select id="mApprover"><option>Фаундер / директорат</option><option>Дмитрий (продукт)</option><option>Екатерина (рук. креаторов)</option></select></div>
      <div class="form-row"><label>Дополнительный согласующий</label><select id="mApprover2"><option value="">Не выбран</option><option>Марина (маркетинг)</option><option>Кирилл (производство)</option></select></div>

      <div class="form-row"><label>Прикреплённые файлы</label>${existingFiles.length?existingFiles.map(f=>`<div class="file-sub">${esc(f.name)}</div>`).join(''):'<div class="file-sub">Файлы не прикреплены</div>'}</div>
      <div class="form-check"><input type="checkbox" id="mNotify" checked><label for="mNotify">Уведомить согласующего</label></div>
    </div>
    <div class="modal-foot"><button class="btn" data-action="closeModal">Отмена</button><button class="btn btn-primary" data-action="submitApproval" data-kind="${kind}" data-id="${id}">Отправить</button></div>

function submitApproval(kind,id){
  if(kind==='task'){ const t=findTask(id); t.approvalStatus='in_review'; t.approvalHistory.push({time:'сегодня, '+nowTimeStr(), text:'Отправлено на согласование'}); t.history.push({time:'сегодня, '+nowTimeStr(), text:'Отправлено на согласование'}); }
  else if(kind==='stage'){ const s=findStage(id); s.approvalStatus = s.approvalStatus==='partial' ? 'partial' : 'in_review'; }
  else if(kind==='handoff'){ const h=DB.handoffs.find(x=>x.id===id); h.approvalStatus='in_review'; }
  else if(kind==='event'){ const e=DB.events.find(x=>x.id===id); e.status='in_review'; }
  closeModal();
  toast('Результат отправлен на согласование','success');
  rerenderAll();
}

}

function openReviseTaskModal(id){ openReviseModalGeneric('submitReviseTask', id); }
function submitRevise(id){
  const comment=document.getElementById('mReviseComment').value.trim();
  if(!comment){ toast('Комментарий обязателен для возврата на доработку','error'); return; }
  const a=DB.approvals.find(x=>x.id===id);
  if(a){ a.status='revision'; a.reviseComment=comment; if(a.relatedTask){ const t=findTask(a.relatedTask); if(t){ t.approvalStatus='needs_revision'; t.approvalHistory.push({time:'сегодня, '+nowTimeStr(), text:'Возвращено на доработку: '+comment}); } } }
  closeModal();
  toast('Результат возвращён на доработку','warn');
  rerenderAll();
}
function submitReviseTask(id){
  const comment=document.getElementById('mReviseComment').value.trim();
  if(!comment){ toast('Комментарий обязателен для возврата на доработку','error'); return; }
  const t=findTask(id);
  t.approvalStatus='needs_revision';
  t.approvalHistory.push({time:'сегодня, '+nowTimeStr(), text:'Возвращено на доработку: '+comment});

  toast('Результат возвращён на доработку','warn');
  rerenderAll();
}

========================================================= */
function unlockDependents(taskId){
  DB.tasks.forEach(t=>{
    if(t.dependsOn.includes(taskId) && (t.status==='blocked'||t.status==='not_started')){
      const allDepsOk = t.dependsOn.every(dep=>{ const d=findTask(dep); return d && d.status==='done'; });
      if(allDepsOk){ t.status='ready'; t.history.push({time:'сегодня, '+nowTimeStr(), text:'Задача разблокирована'}); toast('Следующая задача разблокирована','success'); }
    }
  });
}
function approveItem(id){
  const a=DB.approvals.find(x=>x.id===id); if(!a) return;
  a.status='approved';
  if(a.relatedTask){ const t=findTask(a.relatedTask); if(t){ t.approvalStatus='approved'; t.status='done'; t.approvalHistory.push({time:'сегодня, '+nowTimeStr(), text:'Согласовано фаундером'}); unlockDependents(t.id); } }
  toast('Согласование завершено','success');
  rerenderAll();
}
function reviseItem(id){ openReviseModal(id); }
function decideTask(decision, id){
  const t=findTask(id); if(!t) return;
  if(decision==='approve'){ t.approvalStatus='approved'; t.status='done'; t.approvalHistory.push({time:'сегодня, '+nowTimeStr(), text:'Согласовано'}); unlockDependents(t.id); toast('Согласование завершено','success'); }
  else { t.approvalStatus='rejected'; t.approvalHistory.push({time:'сегодня, '+nowTimeStr(), text:'Отклонено'}); toast('Результат отклонён','error'); }
  rerenderAll();
}
function markTaskDone(id){ const t=findTask(id); t.status='done'; t.progress=[t.checklist.length,t.checklist.length]; t.checklist.forEach(c=>c.d=true); t.history.push({time:'сегодня, '+nowTimeStr(), text:'Задача отмечена выполненной'}); toast('Статус изменён','success'); unlockDependents(id); rerenderAll(); }
function markEventDone(id){ const e=DB.events.find(x=>x.id===id); e.status='done'; toast('Статус изменён','success'); rerenderAll(); }
function rescheduleEvent(id){ if(DB.ui.role==='employee'){ toast('Изменить срок может руководитель проекта','warn'); return; } openRescheduleModal(id); }

function pickFileAndRun(cb){
  const inp=document.createElement('input'); inp.type='file'; inp.style.display='none'; document.body.appendChild(inp);
  inp.onchange=()=>{ if(inp.files[0]){ cb(makeFileRecord(inp.files[0])); } inp.remove(); };
  inp.click();
}
function quickAttach(taskId){ pickFileAndRun(rec=>{ const t=findTask(taskId); t.files.push(rec); t.history.push({time:'сегодня, '+nowTimeStr(), text:'Прикреплён файл: '+rec.name}); toast('Файл прикреплён','success'); rerenderAll(); }); }
function quickAttachEvent(id){ pickFileAndRun(rec=>{ const e=DB.events.find(x=>x.id===id); if(!e.files) e.files=[]; e.files.push(rec); toast('Файл прикреплён','success'); rerenderAll(); }); }
function attachFileStage(id){ pickFileAndRun(rec=>{ const s=findStage(id); if(!s.extraFiles) s.extraFiles=[]; s.extraFiles.push(rec); toast('Файл прикреплён','success'); rerenderAll(); }); }
function attachFileHandoff(id){ pickFileAndRun(rec=>{ const h=DB.handoffs.find(x=>x.id===id); toast('Файл прикреплён','success'); rerenderAll(); }); }
function addLinkTask(taskId){
  const url=prompt('Вставьте ссылку на материал:'); if(!url) return;
  const t=findTask(taskId); t.files.push({name:url, ext:'LINK', size:'—', added:'сегодня', author:'Екатерина', version:'v1', approval:'not_sent'});
  toast('Файл прикреплён','success'); rerenderAll();
}
function addLinkStage(id){ const url=prompt('Вставьте ссылку на материал:'); if(!url) return; const s=findStage(id); if(!s.extraFiles) s.extraFiles=[]; s.extraFiles.push({name:url, ext:'LINK', size:'—', added:'сегодня', author:'Екатерина', version:'v1', approval:'not_sent'}); toast('Файл прикреплён','success'); rerenderAll(); }
function fileMarkFinal(name){ toast('Файл помечен как финальный','success'); }
function fileRemove(name){ toast('Файл удалён','warn'); }
function addCommentStage(id){ const text=prompt('Комментарий к этапу:'); if(!text) return; toast('Комментарий добавлен','success'); }
function withdrawStage(id){ const s=findStage(id); s.approvalStatus='not_sent'; toast('Результат отозван с согласования','warn'); rerenderAll(); }
function viewStageComments(id){ toast('Комментарии: «Продукт — проверьте цветопередачу коробки»','success'); }
function openStageDecision(id){ toast('Открыто решение по этапу','success'); }
function openStageTasksAll(id){ DB.ui.tab='mywork'; UI.myWorkTab='dept'; UI.myWorkFilters.scope='all'; rerenderAll(); }
function sendStageApproval(id){ openSendApprovalModal('stage', id); }
function transferStageForward(id){ toast('Результат передан следующему отделу','success'); }
function quickSendApproval(taskId){ openSendApprovalModal('task', taskId); }
function sendHandoffApproval(id){ openSendApprovalModal('handoff', id); }
function transferHandoff(id){
  const h=DB.handoffs.find(x=>x.id===id); if(!h) return;
  const missing=h.materials.filter(m=>!m.d);
  if(missing.length){
    toast('Передача пока невозможна: не хватает материалов','warn');
    const card=document.getElementById('handoff-'+id);
    if(card){ card.scrollIntoView({behavior:'smooth', block:'center'}); card.style.boxShadow='0 0 0 3px var(--red)'; setTimeout(()=>{ if(card) card.style.boxShadow=''; },1600); }
    return;
  }
  if(h.approvalStatus!=='approved'){ toast('Сначала получите согласование обязательных материалов','warn'); return; }
  h.status='transferred';
  h.history.push('Материалы переданы — сегодня, '+nowTimeStr());
  toast('Материалы переданы','success');
  toast('Следующая задача разблокирована','success');
  rerenderAll();
}

function runSearch(q){
  const box=document.getElementById('searchResults');
  if(!q || q.length<1){ box.classList.add('hidden'); box.innerHTML=''; return; }
  const ql=q.toLowerCase();
  const hl=(s)=>{ const i=s.toLowerCase().indexOf(ql); if(i<0) return esc(s); return esc(s.slice(0,i))+'<mark>'+esc(s.slice(i,i+q.length))+'</mark>'+esc(s.slice(i+q.length)); };
  const models=MODELS_DEFAULT.filter(m=>m.name.toLowerCase().includes(ql));
  const stages=DB.stages.filter(s=>s.name.toLowerCase().includes(ql));
  const tasks=DB.tasks.filter(t=>t.title.toLowerCase().includes(ql)||t.assignee.toLowerCase().includes(ql)).slice(0,6);
  if(!models.length && !stages.length && !tasks.length){ box.innerHTML='<div class="empty-state" style="padding:16px;">Ничего не найдено</div>'; box.classList.remove('hidden'); return; }
  let html='';
  if(models.length) html+=`<div class="sr-group">Модели</div>`+models.map(m=>`<div class="sr-item" data-action="openModel" data-id="${m.id}">${ic('package',15)}${hl(m.name)}</div>`).join('');
  if(stages.length) html+=`<div class="sr-group">Этапы</div>`+stages.map(s=>`<div class="sr-item" data-action="openStageFromPopover" data-idx="${s.idx-1}">${ic('grid',15)}${hl(s.name)}</div>`).join('');
  if(tasks.length) html+=`<div class="sr-group">Задачи</div>`+tasks.map(t=>`<div class="sr-item" data-action="openTask" data-id="${t.id}">${ic('briefcase',15)}${hl(t.title)}</div>`).join('');
  box.innerHTML=html; box.classList.remove('hidden');
}

const TOUR_STEPS = {

    {sel:'.mtimeline', title:'Прогноз сроков', text:'Управленческая шкала показывает текущий этап и контрольные точки каждой модели.'},
    {sel:'#approvalsList', title:'Сегодня на согласовании', text:'Решения, которые требуют вашего внимания прямо сейчас.'},
    {sel:'#tabsNav', title:'Управленческий календарь', text:'Вкладка «Календарь» показывает события всех моделей компании.'},
    {sel:'.card:has(.attn-item)', title:'Критические риски', text:'Здесь собраны проблемы, которые требуют решения руководства.'},
  ],
  other:[
    {sel:'.model-header', title:'Общий прогресс', text:'Здесь виден общий прогресс модели и её текущий этап.'},
    {sel:'.stage-rail', title:'Текущий этап', text:'Кликните на этап, чтобы увидеть краткую информацию или открыть его целиком.'},
    {sel:'.grid.grid-4', title:'Блокирующие задачи', text:'Карточки показывают, что заблокировано и что требует согласования.'},
    {sel:'#tabsNav', title:'Моя работа', text:'Вкладка «Моя работа» никогда не бывает пустой — там ваши задачи и согласования.'},
    {sel:'#tabsNav', title:'Передачи', text:'Вкладка «Передачи» показывает, как результат переходит между отделами.'},
  ]
};
function startTour(){
  UI.tourActive=true; UI.tourStep=0; UI.tourRole = DB.ui.role==='founder' ? 'founder' : 'other';
  if(DB.ui.tab!=='overview'){ DB.ui.tab='overview'; renderTabsNav(); renderMain(); }
  document.getElementById('tour-layer').classList.add('show');
  showTourStep();
}
function endTour(){ UI.tourActive=false; document.getElementById('tour-layer').classList.remove('show'); }
function showTourStep(){
  const steps=TOUR_STEPS[UI.tourRole];
  const step=steps[UI.tourStep];
  const box=document.getElementById('tour-box'); const hl=document.getElementById('tour-highlight');
  let target=null;
  try{ target=document.querySelector(step.sel); }catch(e){ target=null; }
  const r = target ? target.getBoundingClientRect() : {top:80,left:80,width:300,height:120};
  hl.style.top=(r.top-6)+'px'; hl.style.left=(r.left-6)+'px'; hl.style.width=(r.width+12)+'px'; hl.style.height=(r.height+12)+'px';
  let boxTop=r.bottom+16; let boxLeft=Math.min(window.innerWidth-320, Math.max(16,r.left));
  if(boxTop+180>window.innerHeight) boxTop=Math.max(16,r.top-190);
  box.style.top=boxTop+'px'; box.style.left=boxLeft+'px';
  box.innerHTML=`
    <div class="tour-step">Шаг ${UI.tourStep+1} из ${steps.length}</div>
    <h4>${esc(step.title)}</h4><p>${esc(step.text)}</p>
    <div class="tour-foot">
      <button class="btn btn-sm" data-action="tourBack" ${UI.tourStep===0?'disabled':''}>Назад</button>
      <div style="display:flex;gap:8px;">
        <button class="btn btn-sm" data-action="tourEnd">Завершить</button>
        ${UI.tourStep<steps.length-1?`<button class="btn btn-sm btn-primary" data-action="tourNext">Далее</button>`:`<button class="btn btn-sm btn-primary" data-action="tourEnd">Готово</button>`}
      </div>
    </div>`;
}
function tourNext(){ UI.tourStep++; showTourStep(); }
function tourBack(){ if(UI.tourStep>0){ UI.tourStep--; showTourStep(); } }

function afterMainRender(){ /* hook for post-render tweaks if needed */ }

document.addEventListener('click', function(e){
  const menuBtn=document.getElementById('userMenuBtn'), menu=document.getElementById('userMenu');
  const bellBtn=document.getElementById('bellBtn'), notifMenu=document.getElementById('notifMenu');
  if(!menuBtn.contains(e.target) && !menu.contains(e.target)) menu.classList.remove('open');
  if(!bellBtn.contains(e.target) && !notifMenu.contains(e.target)) notifMenu.classList.remove('open');

  const el=e.target.closest('[data-action]');
  if(!el){
    const sr=document.getElementById('searchResults'), si=document.getElementById('globalSearch');
    if(sr && !sr.contains(e.target) && e.target!==si) sr.classList.add('hidden');
    return;
  }
  const a=el.dataset.action;
  switch(a){
    case 'setRole': DB.ui.role=el.dataset.role; UI.myWorkTab=null; document.getElementById('userMenu').classList.remove('open'); toast('Роль изменена: '+ROLES[el.dataset.role],'success'); rerenderAll(); break;
    case 'setTab': DB.ui.tab=el.dataset.tab; rerenderAll(); break;
    case 'markAllRead': DB.notifications.forEach(n=>n.read=true); toast('Все уведомления отмечены прочитанными','success'); renderNotifMenu(); renderTopbar(); saveDB(); break;
    case 'setFilterCards': toast('Применён фильтр по портфелю','success'); break;
    case 'openApprovalsQueue': openApprovalsQueue(); break;
    case 'openModel': DB.ui.model=el.dataset.id; toast('Проект переключён','success'); DB.ui.tab='overview'; rerenderAll(); break;
    case 'openStagePopover': openStagePopover(el.dataset.model, parseInt(el.dataset.idx), el); break;
    case 'openStageFromPopover': openStageFromPopover(parseInt(el.dataset.idx)); break;
    case 'toggleStage': UI.openStages[el.dataset.id]=!UI.openStages[el.dataset.id]; renderMain(); break;
    case 'setPathView': UI.pathView=el.dataset.view; renderMain(); break;
    case 'setGanttScale': UI.ganttScale=el.dataset.scale; renderMain(); break;
    case 'toggleGanttDept': UI.ganttCollapsed[el.dataset.dept]=!UI.ganttCollapsed[el.dataset.dept]; renderMain(); break;
    case 'togglePathFilter': UI.pathFilters[el.dataset.f]=!UI.pathFilters[el.dataset.f]; renderMain(); break;
    case 'resetPathFilters': UI.pathFilters={department:'all',assignee:'all',status:'all',approval:'all',period:'all',overdueOnly:false,blockedOnly:false,hideCompleted:false}; toast('Фильтры сброшены','success'); renderMain(); break;
    case 'pathFilterStatus': DB.ui.tab='path'; UI.pathView='stages'; UI.pathFilters.status=el.dataset.status; rerenderAll(); break;
    case 'pathFilterApproval': DB.ui.tab='path'; UI.pathView='stages'; UI.pathFilters.approval=el.dataset.status; rerenderAll(); break;
    case 'pathFilterDept': DB.ui.tab='path'; UI.pathView='stages'; UI.pathFilters.department=el.dataset.dept; rerenderAll(); break;
    case 'attachFileStage': attachFileStage(el.dataset.id); break;
    case 'addLinkStage': addLinkStage(el.dataset.id); break;
    case 'addCommentStage': addCommentStage(el.dataset.id); break;
    case 'withdrawStage': withdrawStage(el.dataset.id); break;
    case 'viewStageComments': viewStageComments(el.dataset.id); break;
    case 'openStageDecision': openStageDecision(el.dataset.id); break;
    case 'openStageTasksAll': openStageTasksAll(el.dataset.id); break;
    case 'sendStageApproval': sendStageApproval(el.dataset.id); break;
    case 'transferStageForward': transferStageForward(el.dataset.id); break;
    case 'openTask': openTaskDrawer(el.dataset.id); break;
    case 'quickAttach': quickAttach(el.dataset.id); break;
    case 'quickAttachEvent': quickAttachEvent(el.dataset.id); break;
    case 'quickSendApproval': quickSendApproval(el.dataset.id); break;
    case 'fileMarkFinal': fileMarkFinal(el.dataset.name); break;
    case 'fileRemove': fileRemove(el.dataset.name); rerenderAll(); break;
    case 'closeDrawer': closeDrawer(); break;
    case 'setDrawerTab': UI.drawerTab=el.dataset.tab; renderDrawer(); break;
    case 'toggleChecklist': (function(){ const t=findTask(el.dataset.id); const idx=parseInt(el.dataset.idx); t.checklist[idx].d=!t.checklist[idx].d; const done=t.checklist.filter(c=>c.d).length; t.progress=[done,t.checklist.length]; t.history.push({time:'сегодня, '+nowTimeStr(), text:'Отмечен пункт чек-листа'}); toast('Статус изменён','success'); rerenderAll(); })(); break;
    case 'addLinkTask': addLinkTask(el.dataset.id); break;
    case 'openSendApprovalModal': openSendApprovalModal(el.dataset.kind, el.dataset.id); break;
    case 'submitApproval': submitApproval(el.dataset.kind, el.dataset.id); break;
    case 'openReviseTaskModal': openReviseTaskModal(el.dataset.id); break;
    case 'submitReviseTask': submitReviseTask(el.dataset.id); break;
    case 'decideTask': decideTask(el.dataset.decision, el.dataset.id); break;
    case 'markTaskDone': markTaskDone(el.dataset.id); break;
    case 'addTaskComment': (function(){ const ta=document.getElementById('newCommentText'); const v=ta.value.trim(); if(!v) return; const t=findTask(el.dataset.id); t.comments.push({author:'Екатерина', time:'сегодня, '+nowTimeStr(), text:v}); toast('Комментарий добавлен','success'); rerenderAll(); })(); break;
    case 'closeModal': closeModal(); break;
    case 'submitRevise': submitRevise(el.dataset.id); break;
    case 'submitReschedule': submitReschedule(el.dataset.id); break;
    case 'remindAssignee': remindAssignee(el.dataset.id); break;
    case 'openApprovalDetail': openApprovalDetail(el.dataset.id); break;
    case 'approveItem': approveItem(el.dataset.id); break;
    case 'reviseItem': reviseItem(el.dataset.id); break;
    case 'moreMenuApproval': moreMenuApproval(el.dataset.id); break;
    case 'openEvent': openEventDrawer(el.dataset.id); break;
    case 'openDayList': openDayList(el.dataset.date); break;
    case 'rescheduleEvent': rescheduleEvent(el.dataset.id); break;
    case 'markEventDone': markEventDone(el.dataset.id); break;
    case 'calPrev': calShift(-1); break;
    case 'calNext': calShift(1); break;
    case 'calToday': UI.calDate=new Date(2026,6,16); UI.calView=UI.calView==='gantt'?UI.calView:UI.calView; DB.ui.tab='calendar'; rerenderAll(); break;
    case 'setCalView': UI.calView=el.dataset.view; renderMain(); break;
    case 'toggleCalFilter': UI.calFilters[el.dataset.f]=!UI.calFilters[el.dataset.f]; renderMain(); break;
    case 'resetCalFilters': UI.calFilters={model:'all',department:'all',assignee:'all',type:'all',status:'all',critical:false,mine:false,approvalsOnly:false,handoffsOnly:false}; toast('Фильтры сброшены','success'); renderMain(); break;
    case 'setMyWorkTab': UI.myWorkTab=el.dataset.tab; renderMain(); break;
    case 'setMyWorkFilter': UI.myWorkFilters.scope=el.dataset.f; renderMain(); break;
    case 'toggleTaskGroup': UI.taskGroupCollapsed[el.dataset.key]=!UI.taskGroupCollapsed[el.dataset.key]; renderMain(); break;
    case 'attachFileHandoff': attachFileHandoff(el.dataset.id); break;
    case 'sendHandoffApproval': sendHandoffApproval(el.dataset.id); break;
    case 'transferHandoff': transferHandoff(el.dataset.id); break;
    case 'tourNext': tourNext(); break;
    case 'tourBack': tourBack(); break;
    case 'tourEnd': endTour(); break;
  }
});
function openDayList(dateStr){
  const events=applyCalFilters(calendarBaseEvents()).filter(e=>e.dateStart===dateStr);
  const html=`<div class="modal-head"><h3>${fmtDate(dateStr,{day:'numeric',month:'long'})}</h3><button class="drawer-close" data-action="closeModal" aria-label="Закрыть">${ic('x',18)}</button></div>
  <div class="modal-body">${events.length?events.map(e=>`<div class="cal-list-item" data-action="openEvent" data-id="${e.id}"><div class="me-ic" style="background:${EVENT_TYPES[e.type].bg};color:${EVENT_TYPES[e.type].color}">${ic(EVENT_TYPES[e.type].icon,15)}</div><div><div style="font-weight:600;">${esc(e.title)}</div><div style="font-size:12px;color:var(--text2);">${EVENT_TYPES[e.type].label}</div></div></div>`).join(''):'<div class="empty-state">Нет событий</div>'}</div>`;
  openModal(html); closeDrawer();
}
function calShift(dir){
  const d=UI.calDate;
  if(UI.calView==='month') UI.calDate=new Date(d.getFullYear(), d.getMonth()+dir, 1);
  else UI.calDate=new Date(d.getFullYear(), d.getMonth(), d.getDate()+dir*7);
  renderMain();
}

document.addEventListener('change', function(e){
  const t=e.target;
  if(t.id==='modelSelect'){ DB.ui.model=t.value; toast('Проект переключён','success'); rerenderAll(); return; }
  const act=t.dataset.action;
  if(act==='calFilterChange'){ UI.calFilters[t.dataset.f]=t.value; renderMain(); return; }
  if(act==='pathFilterChange'){ UI.pathFilters[t.dataset.f]=t.value; renderMain(); return; }
  if(act==='changeAssignee'){ if(DB.ui.role==='employee'){ toast('Изменить ответственного может руководитель проекта','warn'); renderMain(); return;} findTask(t.dataset.id).assignee=t.value; toast('Статус изменён','success'); rerenderAll(); return; }
  if(act==='changeDueDate'){ if(DB.ui.role==='employee'){ toast('Изменить срок может руководитель проекта','warn'); renderMain(); return;} findTask(t.dataset.id).dueDate=t.value; toast('Статус изменён','success'); rerenderAll(); return; }
  if(act==='changePriority'){ findTask(t.dataset.id).priority=t.value; toast('Статус изменён','success'); rerenderAll(); return; }
});

document.getElementById('globalSearch').addEventListener('input', e=>runSearch(e.target.value));
document.getElementById('userMenuBtn').addEventListener('click', e=>{ e.stopPropagation(); renderUserMenu(); document.getElementById('notifMenu').classList.remove('open'); document.getElementById('userMenu').classList.toggle('open'); });
document.getElementById('bellBtn').addEventListener('click', e=>{ e.stopPropagation(); renderNotifMenu(); document.getElementById('userMenu').classList.remove('open'); document.getElementById('notifMenu').classList.toggle('open'); });
document.getElementById('apprIconBtn').addEventListener('click', ()=>openApprovalsQueue());
document.getElementById('calTodayBtn').addEventListener('click', ()=>{ DB.ui.tab='calendar'; UI.calDate=new Date(2026,6,16); UI.calView='month'; rerenderAll(); });
document.getElementById('tourBtn').addEventListener('click', ()=>startTour());

document.addEventListener('keydown', function(e){
  if(e.key==='Escape'){
    closeModal();
    if(UI.drawerTaskId) closeDrawer();
    document.getElementById('userMenu').classList.remove('open');
    document.getElementById('notifMenu').classList.remove('open');
    document.getElementById('searchResults').classList.add('hidden');
    document.getElementById('stagePopover').classList.remove('show');
    if(UI.tourActive) endTour();
  }
});

function normalizeDB(){
  DB.tasks.forEach(t=>{
    if(!t.comments) t.comments=[{author:t.assignee, time:'вчера, 14:20', text:'Начал(а) работу по задаче, ориентируюсь на входные требования.'}];
    if(!t.history) t.history=[{time:t.startDate.split('T')[0], text:'Задача создана'},{time:t.startDate.split('T')[0], text:'Назначен ответственный: '+t.assignee}];
    if(!t.approvalHistory) t.approvalHistory=[];
  });
  DB.handoffs.forEach(h=>{ if(typeof h.history[0]!=='string'){} });
}
normalizeDB();
renderTopbar();
renderTabsNav();
renderMain();
