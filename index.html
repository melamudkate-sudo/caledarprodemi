<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Производственный календарь — DEMIAND</title>
<style>
:root{
  --bg:#F6F7F9; --card:#FFFFFF; --text:#1D1F23; --text2:#667085; --border:#E4E7EC;
  --red:#D92D20; --red-hover:#B42318; --red-bg:#FEF3F2;
  --blue:#2563EB; --blue-bg:#EFF4FF;
  --green:#079455; --green-bg:#ECFDF3;
  --amber:#B45309; --amber-bg:#FFFAEB;
  --purple:#7C3AED; --purple-bg:#F5F3FF;
  --indigo:#4F46E5; --indigo-bg:#EEF2FF;
  --pink:#C026A3; --pink-bg:#FDF2FB;
  --teal:#0D9488; --teal-bg:#EFFCFA;
  --gray:#667085; --gray-bg:#F2F4F7;
  --graphite:#344054; --graphite-bg:#EEF1F5;
  --shadow: 0 1px 2px rgba(16,24,40,.04), 0 1px 3px rgba(16,24,40,.06);
  --shadow-lg: 0 4px 12px rgba(16,24,40,.10), 0 2px 4px rgba(16,24,40,.06);
  --radius:14px; --radius-sm:8px;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:var(--bg); color:var(--text);
  font-family:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  font-size:14px; line-height:1.5; -webkit-font-smoothing:antialiased;
}
h1,h2,h3,h4,p{margin:0;}
button{font-family:inherit;}
.icon{width:18px;height:18px;flex:none;display:inline-block;vertical-align:middle;}
::-webkit-scrollbar{width:8px;height:8px;}
::-webkit-scrollbar-thumb{background:#D0D5DD;border-radius:8px;}
a{color:inherit;}
button:focus-visible, [tabindex]:focus-visible, input:focus-visible, select:focus-visible{
  outline:2px solid var(--blue); outline-offset:2px;
}

/* ===== Layout shell ===== */
#app{min-width:1024px; overflow-x:auto;}
.topbar{
  position:sticky; top:0; z-index:40; background:#fff; border-bottom:1px solid var(--border);
  display:flex; align-items:center; gap:16px; padding:0 20px; height:58px;
}
.tb-left{display:flex; align-items:center; gap:10px; flex:none;}
.logo{font-weight:800; letter-spacing:.5px; font-size:15px; color:var(--red);}
.sysname{font-size:13px; color:var(--text2); border-left:1px solid var(--border); padding-left:10px;}
.tb-center{flex:1; display:flex; align-items:center; gap:10px; justify-content:center; max-width:760px; margin:0 auto; position:relative;}
.select-model{
  height:36px; border:1px solid var(--border); border-radius:var(--radius-sm); background:#fff;
  padding:0 30px 0 12px; font-size:13.5px; font-weight:600; color:var(--text); min-width:220px; cursor:pointer;
}
.search-wrap{position:relative; flex:1; max-width:400px;}
.search-input{
  width:100%; height:36px; border:1px solid var(--border); border-radius:var(--radius-sm); padding:0 12px 0 34px;
  font-size:13.5px; background:var(--bg);
}
.search-icon{position:absolute; left:10px; top:9px; color:var(--text2); pointer-events:none;}
.search-results{
  position:absolute; top:42px; left:0; right:0; background:#fff; border:1px solid var(--border); border-radius:var(--radius);
  box-shadow:var(--shadow-lg); max-height:360px; overflow:auto; z-index:60; padding:6px;
}
.search-results .sr-group{font-size:11px; text-transform:uppercase; letter-spacing:.4px; color:var(--text2); padding:8px 8px 4px;}
.sr-item{display:flex; align-items:center; gap:8px; padding:8px; border-radius:8px; cursor:pointer;}
.sr-item:hover{background:var(--bg);}
.sr-item mark{background:#FEF0C7; color:inherit; border-radius:3px;}
.tb-right{display:flex; align-items:center; gap:4px; flex:none;}
.icon-btn{
  width:36px; height:36px; border-radius:var(--radius-sm); border:1px solid transparent; background:none;
  display:flex; align-items:center; justify-content:center; cursor:pointer; color:var(--text2); position:relative;
}
.icon-btn:hover{background:var(--bg); color:var(--text);}
.hint-btn{
  height:36px; padding:0 12px; border-radius:var(--radius-sm); border:1px solid var(--border); background:#fff;
  display:flex; align-items:center; gap:6px; font-size:12.5px; font-weight:600; cursor:pointer; color:var(--text);
}
.hint-btn:hover{background:var(--bg);}
.badge-dot{
  position:absolute; top:4px; right:4px; min-width:15px; height:15px; border-radius:8px; background:var(--red); color:#fff;
  font-size:9.5px; font-weight:700; display:flex; align-items:center; justify-content:center; padding:0 3px; border:2px solid #fff;
}
.tb-user{display:flex; align-items:center; gap:8px; padding:4px 8px 4px 4px; border-radius:20px; cursor:pointer; border:1px solid transparent;}
.tb-user:hover{background:var(--bg);}
.avatar{
  width:30px; height:30px; border-radius:50%; background:var(--graphite); color:#fff; font-weight:700; font-size:12px;
  display:flex; align-items:center; justify-content:center; flex:none;
}
.tb-user-meta{line-height:1.25;}
.tb-user-name{font-size:12.5px; font-weight:600;}
.tb-user-role{font-size:11px; color:var(--text2);}

.usermenu, .notifmenu{
  position:absolute; top:50px; right:20px; width:290px; background:#fff; border:1px solid var(--border); border-radius:var(--radius);
  box-shadow:var(--shadow-lg); z-index:70; padding:10px; display:none;
}
.usermenu.open, .notifmenu.open{display:block;}
.menu-label{font-size:11px; color:var(--text2); text-transform:uppercase; letter-spacing:.4px; padding:8px 8px 4px;}
.menu-item{
  display:flex; align-items:center; gap:10px; padding:9px 8px; border-radius:8px; cursor:pointer; font-size:13.5px;
}
.menu-item:hover{background:var(--bg);}
.menu-item.active{background:var(--graphite-bg); color:var(--graphite); font-weight:600;}
.notif-item{padding:10px 8px; border-radius:8px; cursor:default;}
.notif-item:hover{background:var(--bg);}
.notif-item .nt{font-size:13px;}
.notif-item .nd{font-size:11.5px; color:var(--text2); margin-top:2px;}
.notif-item.unread .nt::before{content:"●"; color:var(--red); margin-right:6px; font-size:9px;}

/* ===== Top-level navigation ===== */
.tabsnav{
  position:sticky; top:58px; z-index:35; background:#fff; border-bottom:1px solid var(--border);
  display:flex; gap:4px; padding:0 20px;
}
.tab-btn{
  height:44px; padding:0 16px; border:none; background:none; font-size:13.5px; font-weight:600; color:var(--text2);
  cursor:pointer; border-bottom:2px solid transparent; display:flex; align-items:center; gap:7px; border-radius:8px 8px 0 0;
}
.tab-btn:hover{color:var(--text); background:var(--bg);}
.tab-btn.active{color:var(--text); background:var(--bg); border-bottom-color:var(--red); font-weight:700;}

/* ===== Context bar ===== */
.context-bar{
  position:sticky; top:102px; z-index:34; background:#FBFBFC; border-bottom:1px solid var(--border);
  padding:9px 20px; display:flex; align-items:center; justify-content:space-between; gap:14px; flex-wrap:wrap; font-size:12.5px;
}
.ctx-left{display:flex; align-items:center; gap:10px; flex-wrap:wrap; min-width:0;}
.ctx-model{font-weight:800; font-size:13.5px;}
.ctx-sep{color:var(--border);}
.ctx-item{color:var(--text2); white-space:nowrap;}
.ctx-item b{color:var(--text); font-weight:600;}
.ctx-right{display:flex; align-items:center; gap:10px; color:var(--text2); flex-wrap:wrap;}
.ctx-right b{color:var(--text);}

/* ===== Breadcrumb ===== */
.breadcrumb{padding:10px 20px 0; font-size:12.5px; color:var(--text2); display:flex; align-items:center; gap:6px; flex-wrap:wrap;}
.bc-link{border:none; background:none; color:var(--blue); cursor:pointer; font-size:12.5px; padding:0;}
.bc-link:hover{text-decoration:underline;}
.bc-current{color:var(--text); font-weight:600;}
.bc-sep{color:#C0C5CD;}

main#main-content{max-width:1320px; margin:0 auto; padding:18px 20px 60px;}
.section-title{font-size:19px; font-weight:700; margin-bottom:2px;}
.section-sub{font-size:13.5px; color:var(--text2); margin-bottom:16px;}

/* ===== Cards / grid ===== */
.card{background:var(--card); border:1px solid var(--border); border-radius:var(--radius); box-shadow:var(--shadow);}
.grid{display:grid; gap:14px;}
.grid-4{grid-template-columns:repeat(4,1fr);}
.grid-3{grid-template-columns:repeat(3,1fr);}
.grid-2{grid-template-columns:repeat(2,1fr);}
@media (max-width:1280px){ .grid-4{grid-template-columns:repeat(2,1fr);} .grid-3{grid-template-columns:repeat(2,1fr);} }

/* Compact KPI line (replaces big stat-card grids) */
.kpi-line{display:flex; align-items:center; gap:0; flex-wrap:wrap; background:#fff; border:1px solid var(--border); border-radius:var(--radius-sm); padding:4px 6px; margin-bottom:16px;}
.kpi-chip{display:flex; align-items:center; gap:7px; padding:8px 14px; border-radius:8px; cursor:pointer; font-size:13px; color:var(--text2); border-right:1px solid var(--border);}
.kpi-chip:last-child{border-right:none;}
.kpi-chip:hover{background:var(--bg);}
.kpi-chip b{color:var(--text); font-size:15px; font-weight:800;}

.stat-card{padding:16px; cursor:pointer; transition:box-shadow .18s, transform .18s;}
.stat-card:hover{box-shadow:var(--shadow-lg); transform:translateY(-1px);}
.stat-card .stat-num{font-size:24px; font-weight:800; margin:4px 0 2px;}
.stat-card .stat-label{font-size:12.5px; color:var(--text2); font-weight:600;}
.stat-card .stat-sub{font-size:11.5px; color:var(--text2); margin-top:4px;}

/* Badges & pills */
.badge{
  display:inline-flex; align-items:center; gap:5px; font-size:12px; font-weight:600; padding:3px 9px;
  border-radius:999px; white-space:nowrap;
}
.badge .icon{width:13px;height:13px;}
.dept-chip{display:inline-flex; align-items:center; gap:6px; font-size:12px; font-weight:600; padding:3px 9px; border-radius:999px;}
.dept-dot{width:8px; height:8px; border-radius:50%; flex:none;}

.btn{
  height:36px; padding:0 15px; border-radius:var(--radius-sm); font-size:13.5px; font-weight:600; cursor:pointer;
  display:inline-flex; align-items:center; gap:7px; border:1px solid var(--border); background:#fff; color:var(--text);
  transition:background .15s, border-color .15s;
}
.btn:hover{background:var(--bg);}
.btn-primary{background:var(--graphite); border-color:var(--graphite); color:#fff;}
.btn-primary:hover{background:#1D2939; border-color:#1D2939;}
.btn-danger{background:var(--red); border-color:var(--red); color:#fff;}
.btn-danger:hover{background:var(--red-hover); border-color:var(--red-hover);}
.btn-sm{height:32px; padding:0 12px; font-size:12.5px;}
.btn-ghost{border-color:transparent; background:none;}
.btn-ghost:hover{background:var(--bg);}
.btn[disabled]{opacity:.5; cursor:not-allowed;}
.btn-danger-outline{border-color:var(--red); color:var(--red);}
.btn-danger-outline:hover{background:var(--red-bg);}

/* Tooltip */
.tt-trigger{display:inline-flex; align-items:center; justify-content:center; width:16px; height:16px; border-radius:50%;
  background:var(--gray-bg); color:var(--text2); font-size:10.5px; font-weight:700; cursor:help; border:none; margin-left:4px;}
.tooltip-pop{
  position:fixed; z-index:200; max-width:260px; background:#1D1F23; color:#fff; font-size:12.5px; line-height:1.45;
  padding:8px 11px; border-radius:8px; box-shadow:var(--shadow-lg); display:none;
}
.tooltip-pop.show{display:block;}

/* Progress bar — blue default, green for done, graphite for current-stage context */
.pbar{height:8px; background:var(--gray-bg); border-radius:6px; overflow:hidden; position:relative;}
.pbar > div{height:100%; background:var(--blue); border-radius:6px; transition:width .25s;}
.pbar.green > div{background:var(--green);} .pbar.graphite > div{background:var(--graphite);} .pbar.amber > div{background:var(--amber);}

/* ===== Main "what's happening now" block ===== */
.now-block{padding:22px; margin-bottom:16px; border:1px solid var(--border);}
.now-head{display:flex; justify-content:space-between; align-items:flex-start; gap:14px; flex-wrap:wrap; margin-bottom:14px;}
.now-title{font-size:20px; font-weight:800;}
.now-grid{display:grid; grid-template-columns:1fr 1fr; gap:18px;}
@media (max-width:1100px){ .now-grid{grid-template-columns:1fr;} }
.now-part{padding-top:2px;}
.now-part h4{font-size:11.5px; text-transform:uppercase; letter-spacing:.4px; color:var(--text2); margin-bottom:8px; display:flex; align-items:center;}
.now-now-text{font-size:16px; font-weight:700; margin-bottom:4px;}
.now-sub{font-size:13px; color:var(--text2);}
.now-result{font-size:14.5px; font-weight:600; line-height:1.5;}
.now-result .to-whom{color:var(--text2); font-weight:500; font-size:12.5px; margin-top:4px;}
.blocker-row{display:flex; gap:10px; padding:9px 0; border-bottom:1px solid var(--border);}
.blocker-row:last-child{border-bottom:none;}
.blocker-ic{width:28px; height:28px; border-radius:8px; background:var(--amber-bg); color:var(--amber); display:flex; align-items:center; justify-content:center; flex:none;}
.blocker-body{flex:1; min-width:0;}
.blocker-title{font-weight:600; font-size:13px;}
.blocker-meta{font-size:11.5px; color:var(--text2); margin-top:2px;}
.blocker-meta b{color:var(--text); font-weight:600;}
.blocker-go{font-size:12px; color:var(--blue); background:none; border:none; cursor:pointer; padding:0; margin-top:4px; font-weight:600;}
.next-move-item{font-size:13.5px; padding:6px 0;}
.next-move-item b{font-weight:700;}

/* ===== Compact stage route ===== */
.route-mini{display:flex; align-items:stretch; gap:0; margin:16px 0 6px; overflow-x:auto; padding-bottom:6px;}
.route-step{flex:1; min-width:118px; display:flex; flex-direction:column; align-items:center; text-align:center; padding:0 6px; position:relative; cursor:pointer;}
.route-step .rs-conn{position:absolute; top:15px; left:-50%; width:100%; height:2px; background:var(--border); z-index:0;}
.route-step:first-child .rs-conn{display:none;}
.route-step.done .rs-conn{background:var(--green);}
.route-step .rs-dot{width:30px; height:30px; border-radius:50%; background:#fff; border:2px solid var(--border); display:flex; align-items:center; justify-content:center; z-index:1; font-size:12px; font-weight:800; color:var(--text2);}
.route-step.done .rs-dot{background:var(--green-bg); border-color:var(--green); color:var(--green);}
.route-step.current .rs-dot{background:var(--graphite); border-color:var(--graphite); color:#fff;}
.route-step.blocked .rs-dot{background:var(--amber-bg); border-color:var(--amber); color:var(--amber);}
.route-step .rs-name{font-size:12px; font-weight:700; margin-top:7px;}
.route-step .rs-meta{font-size:10.5px; color:var(--text2); margin-top:2px;}
.route-step .rs-here{font-size:9.5px; font-weight:700; color:#fff; background:var(--graphite); padding:2px 7px; border-radius:6px; margin-top:5px;}

/* ===== Stage workspace (single open stage) ===== */
.stage-ws{padding:20px; margin-top:6px;}
.ws-head{display:flex; justify-content:space-between; gap:14px; flex-wrap:wrap; margin-bottom:14px;}
.ws-title{font-size:17px; font-weight:800;}
.ws-sub{font-size:12.5px; color:var(--text2); margin-top:3px;}
.ws-cols{display:grid; grid-template-columns:2fr 1fr; gap:20px;}
@media (max-width:1100px){ .ws-cols{grid-template-columns:1fr;} }
.ws-section{margin-bottom:16px;}
.ws-section h5{font-size:11.5px; text-transform:uppercase; letter-spacing:.3px; color:var(--text2); margin-bottom:8px;}
.ws-section p, .ws-section li{font-size:13.5px;}
.ws-section ul{margin:0; padding-left:18px;}
.io-list{list-style:none; margin:0; padding:0; display:flex; flex-direction:column; gap:5px;}
.io-list li{display:flex; align-items:center; gap:7px; font-size:13px;}
.io-ok{color:var(--green);} .io-missing{color:var(--amber);}

/* ===== Readiness meter ===== */
.readiness-box{border:1px solid var(--border); border-radius:12px; padding:16px;}
.readiness-pct{font-size:30px; font-weight:800;}
.readiness-label{font-size:12px; color:var(--text2); text-transform:uppercase; letter-spacing:.3px; margin-bottom:6px;}
.readiness-sub{font-size:12.5px; color:var(--text2); margin:3px 0;}
.readiness-sub.warn{color:var(--amber); font-weight:600;}

/* Missing-requirements panel */
.missing-panel{border-top:1px dashed var(--border); margin-top:12px; padding-top:12px; display:none;}
.missing-panel.show{display:block;}
.missing-row{display:flex; gap:9px; padding:8px 0; border-bottom:1px solid var(--border); font-size:12.5px;}
.missing-row:last-child{border-bottom:none;}

/* Tooltip / popover for stage rail (route-mini) */
.popover{
  position:fixed; z-index:150; width:280px; background:#fff; border:1px solid var(--border); border-radius:var(--radius);
  box-shadow:var(--shadow-lg); padding:14px; display:none;
}
.popover.show{display:block;}
.popover h4{font-size:14px; margin-bottom:8px;}
.popover .pv-row{display:flex; justify-content:space-between; font-size:12.5px; margin-bottom:6px; color:var(--text2); gap:10px;}
.popover .pv-row b{color:var(--text); text-align:right;}

/* Attention list */
.attn-item{display:flex; gap:12px; padding:13px 0; border-bottom:1px solid var(--border);}
.attn-item:last-child{border-bottom:none;}
.attn-ic{width:32px; height:32px; border-radius:9px; background:var(--amber-bg); color:var(--amber); display:flex; align-items:center; justify-content:center; flex:none;}
.attn-body{flex:1; min-width:0;}
.attn-title{font-weight:600; font-size:13.5px;}
.attn-detail{font-size:12.5px; color:var(--text2); margin-top:3px;}
.attn-detail span{color:var(--text); font-weight:600;}

/* Dept progress rows */
.dept-row{display:flex; align-items:center; gap:12px; padding:9px 0; cursor:pointer; border-radius:8px;}
.dept-row:hover{background:var(--bg);}
.dept-row .dr-name{width:190px; font-size:13px; font-weight:600; display:flex; align-items:center; gap:8px;}
.dept-row .dr-bar{flex:1;}
.dept-row .dr-num{width:60px; text-align:right; font-size:12.5px; color:var(--text2); font-weight:600;}

/* Events list (mini) */
.mini-event{display:flex; gap:10px; padding:10px 0; border-bottom:1px solid var(--border); font-size:13px;}
.mini-event:last-child{border-bottom:none;}
.me-date{width:80px; flex:none; color:var(--text2); font-weight:600; font-size:12.5px;}
.me-ic{width:26px;height:26px;border-radius:7px;display:flex;align-items:center;justify-content:center;flex:none;}

/* ===== Change log (founder "что изменилось") ===== */
.change-row{display:flex; gap:12px; padding:12px 0; border-bottom:1px solid var(--border);}
.change-row:last-child{border-bottom:none;}
.change-time{width:100px; flex:none; font-size:11.5px; color:var(--text2); font-weight:600;}
.change-body{flex:1; min-width:0;}
.change-model{font-size:11px; font-weight:700; color:var(--text2); text-transform:uppercase; letter-spacing:.3px;}
.change-text{font-size:13.5px; font-weight:600; margin-top:2px;}
.change-impact{font-size:12px; color:var(--text2); margin-top:2px;}

/* ===== Model pick card (Models tab / founder portfolio) ===== */
.model-pick{padding:16px; cursor:pointer; transition:box-shadow .18s;}
.model-pick:hover{box-shadow:var(--shadow-lg);}
.mp-top{display:flex; justify-content:space-between; align-items:flex-start; gap:8px;}
.mp-name{font-weight:700; font-size:15px;}
.mp-stage{font-size:12px; color:var(--text2); margin-top:2px;}
.mp-launch{font-size:12px; color:var(--text2); margin:10px 0 4px;}
.mp-risk{display:flex; gap:8px; background:var(--amber-bg); border-radius:8px; padding:8px 10px; margin:8px 0; font-size:12.5px;}
.mp-risk.ok{background:var(--green-bg);}
.mp-risk-ic{color:var(--amber); flex:none;}
.mp-risk.ok .mp-risk-ic{color:var(--green);}
.mp-next{font-size:12.5px; margin:8px 0;}
.mp-next b{font-weight:700;}
.mp-mini-stats{display:flex; gap:12px; font-size:11.5px; color:var(--text2); margin-bottom:10px;}

/* ===== Decision card ===== */
.decision-card{padding:18px; margin-bottom:14px;}
.decision-card.critical{border-color:#FDA29B;}
.dc-top{display:flex; justify-content:space-between; gap:12px; flex-wrap:wrap; align-items:flex-start;}
.dc-title{font-weight:700; font-size:15.5px;}
.dc-model{font-size:11.5px; color:var(--text2); text-transform:uppercase; font-weight:700; letter-spacing:.3px;}
.dc-block{margin-top:12px; font-size:13px;}
.dc-block b{font-weight:700;}
.dc-block-label{font-size:11px; text-transform:uppercase; color:var(--text2); letter-spacing:.3px; margin-bottom:3px;}
.dc-actions{display:flex; gap:8px; margin-top:14px; flex-wrap:wrap;}
.dc-meta-row{display:flex; gap:16px; flex-wrap:wrap; margin-top:10px; font-size:12px; color:var(--text2);}

/* ===== Today tab cards ===== */
.today-card{border:1px solid var(--border); border-radius:12px; padding:14px 16px; background:#fff; margin-bottom:10px;}
.today-action{font-weight:700; font-size:14px;}
.today-meta{font-size:12px; color:var(--text2); margin-top:4px;}
.today-why{font-size:12.5px; color:var(--text2); margin-top:8px; line-height:1.5;}
.today-unlocks{font-size:12px; color:var(--graphite); margin-top:4px; font-weight:600;}
.today-foot{margin-top:12px;}

/* Kanban-ish task groups */
.tgroup{margin-bottom:14px;}
.tgroup-head{display:flex; align-items:center; gap:8px; cursor:pointer; padding:10px 4px; user-select:none;}
.tgroup-head .chev{transition:transform .15s;}
.tgroup-head.collapsed .chev{transform:rotate(-90deg);}
.tgroup-title{font-weight:700; font-size:14.5px;}
.tgroup-count{background:var(--gray-bg); color:var(--text2); font-size:11.5px; font-weight:700; padding:2px 8px; border-radius:10px;}
.tgroup-body{display:flex; flex-direction:column; gap:8px;}
.tgroup-body.collapsed{display:none;}

.task-card{border:1px solid var(--border); border-radius:12px; padding:13px 14px; background:#fff; cursor:pointer; transition:box-shadow .15s;}
.task-card:hover{box-shadow:var(--shadow);}
.tc-top{display:flex; justify-content:space-between; gap:10px; align-items:flex-start;}
.tc-title{font-weight:600; font-size:13.5px;}
.tc-meta{display:flex; gap:8px; flex-wrap:wrap; margin-top:7px; font-size:12px; color:var(--text2);}
.tc-status-line{font-size:12.5px; margin-top:8px; font-weight:600;}
.tc-status-sub{font-size:12px; color:var(--text2); font-weight:400; margin-top:2px;}
.tc-foot{display:flex; justify-content:space-between; align-items:center; margin-top:10px; gap:8px;}
.tc-actions{display:flex; gap:6px;}
.tc-progress-mini{font-size:11.5px; color:var(--text2); display:flex; align-items:center; gap:6px;}

/* Locked field */
.locked-field{display:flex; align-items:center; gap:6px; color:var(--text2); font-size:12.5px; background:var(--gray-bg); padding:4px 9px; border-radius:7px; cursor:help;}

/* Filter bar */
.filterbar{display:flex; gap:8px; flex-wrap:wrap; align-items:center; margin-bottom:16px;}
.filterbar select, .filterbar .chip-toggle{
  height:34px; border:1px solid var(--border); border-radius:8px; background:#fff; font-size:12.5px; padding:0 10px; cursor:pointer;
}
.chip-toggle{display:flex; align-items:center; gap:6px; font-weight:600; color:var(--text2);}
.chip-toggle.active{background:var(--graphite-bg); border-color:#D0D5DD; color:var(--graphite);}
.filter-result-count{font-size:12.5px; color:var(--text2); margin-left:auto;}

.io-cols{display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-bottom:16px;}
.io-box{border:1px solid var(--border); border-radius:10px; padding:12px;}
.io-box h5{font-size:12px; text-transform:uppercase; letter-spacing:.3px; color:var(--text2); margin-bottom:8px;}
.io-box ul{margin:0; padding-left:18px; font-size:13px;}
.io-box li{margin-bottom:4px;}

.approved-block{background:var(--green-bg); border:1px solid #B7EFCB; border-radius:10px; padding:14px; margin-top:14px;}
.approved-block .ab-title{color:var(--green); font-weight:700; font-size:13.5px; display:flex; align-items:center; gap:6px;}

.file-row{display:flex; align-items:center; gap:10px; padding:9px 0; border-bottom:1px solid var(--border);}
.file-row:last-child{border-bottom:none;}
.file-ic{width:32px; height:32px; border-radius:8px; background:var(--blue-bg); color:var(--blue); display:flex; align-items:center; justify-content:center; flex:none;}
.file-meta{flex:1; min-width:0;}
.file-name{font-weight:600; font-size:13px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
.file-sub{font-size:11.5px; color:var(--text2); margin-top:2px;}
.file-actions{display:flex; gap:4px;}

/* Gantt */
.gantt-wrap{display:flex; border:1px solid var(--border); border-radius:var(--radius); overflow:hidden; background:#fff;}
.gantt-left{width:190px; flex:none; border-right:1px solid var(--border);}
.gantt-left-head{height:44px; border-bottom:1px solid var(--border); display:flex; align-items:center; padding:0 12px; font-size:11.5px; font-weight:700; color:var(--text2); background:var(--bg);}
.gantt-dept-row{height:40px; display:flex; align-items:center; padding:0 12px; font-size:12.5px; font-weight:600; border-bottom:1px solid var(--border); gap:8px; cursor:pointer;}
.gantt-right{flex:1; overflow-x:auto; position:relative;}
.gantt-scale{height:44px; border-bottom:1px solid var(--border); display:flex; background:var(--bg); position:sticky; top:0; z-index:2; min-width:900px;}
.gantt-scale div{flex:1; display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:700; color:var(--text2); border-right:1px solid var(--border);}
.gantt-body{position:relative; min-width:900px;}
.gantt-row{height:40px; border-bottom:1px solid var(--border); position:relative;}
.gantt-task{position:absolute; top:7px; height:26px; border-radius:6px; font-size:11px; color:#fff; display:flex; align-items:center; padding:0 8px; white-space:nowrap; overflow:hidden; cursor:pointer; font-weight:600;}
.gantt-today-line{position:absolute; top:0; bottom:0; width:2px; background:var(--graphite); z-index:3;}

/* Calendar */
.cal-layout{display:grid; grid-template-columns:1fr 300px; gap:18px; align-items:start;}
@media (max-width:1100px){ .cal-layout{grid-template-columns:1fr;} }
.cal-head{display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; flex-wrap:wrap; gap:10px;}
.cal-nav{display:flex; align-items:center; gap:6px;}
.cal-period{font-size:16px; font-weight:700; min-width:150px; text-align:center;}
.cal-views{display:flex; gap:4px; background:var(--gray-bg); border-radius:9px; padding:3px;}
.cal-view-btn{border:none; background:none; padding:6px 12px; font-size:12.5px; font-weight:600; border-radius:7px; cursor:pointer; color:var(--text2);}
.cal-view-btn.active{background:#fff; color:var(--text); box-shadow:var(--shadow);}
.cal-grid{display:grid; grid-template-columns:repeat(7,1fr); border:1px solid var(--border); border-radius:var(--radius); overflow:hidden;}
.cal-dow{background:var(--bg); text-align:center; font-size:11.5px; font-weight:700; color:var(--text2); padding:8px 0; border-bottom:1px solid var(--border);}
.cal-cell{min-height:92px; border-right:1px solid var(--border); border-bottom:1px solid var(--border); padding:6px; position:relative;}
.cal-cell:nth-child(7n){border-right:none;}
.cal-cell.other{background:#FAFAFB; color:#C0C5CD;}
.cal-cell.today{background:var(--graphite-bg);}
.cal-daynum{font-size:12px; font-weight:700; margin-bottom:4px;}
.cal-cell.today .cal-daynum{color:var(--graphite);}
.cal-ev{font-size:10.5px; font-weight:600; padding:2px 5px; border-radius:5px; margin-bottom:3px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; cursor:pointer; display:flex; align-items:center; gap:3px;}
.cal-more{font-size:10.5px; color:var(--text2); font-weight:700; cursor:pointer; padding:2px 5px;}
.cal-list-day{margin-bottom:16px;}
.cal-list-daylabel{font-size:13px; font-weight:700; margin-bottom:8px; padding-bottom:6px; border-bottom:1px solid var(--border);}
.cal-list-item{display:flex; gap:10px; align-items:center; padding:9px 10px; border-radius:9px; cursor:pointer;}
.cal-list-item:hover{background:var(--bg);}
.week7-box{border:1px solid var(--border); border-radius:var(--radius); padding:14px; background:#fff;}
.week7-box h4{font-size:13px; margin-bottom:10px;}

/* ===== Checkpoints (between stages) ===== */
.checkpoint-card{border:1px dashed var(--border); border-radius:12px; padding:14px 16px; margin:10px 0; background:#FBFBFC;}
.checkpoint-flow-label{font-size:11px; text-transform:uppercase; letter-spacing:.4px; color:var(--text2); font-weight:700; margin-bottom:6px;}
.cp-title{font-weight:700; font-size:14px;}
.cp-route{font-size:11.5px; color:var(--text2); margin-top:2px;}
.cp-materials{margin-top:10px; display:grid; grid-template-columns:repeat(2,1fr); gap:5px 16px;}
.cp-mat{display:flex; align-items:center; gap:7px; font-size:12.5px;}
.cp-mat.missing{color:var(--amber); font-weight:600;}
.cp-mat .mdot{width:16px; height:16px; border-radius:50%; display:flex; align-items:center; justify-content:center; flex:none; font-size:10px;}
.cp-mat.done .mdot{background:var(--green-bg); color:var(--green);}
.cp-mat.missing .mdot{background:var(--amber-bg); color:var(--amber);}
.stage-arrow{display:flex; justify-content:center; color:var(--text2); padding:2px 0;}

/* Drawer */
#drawer-overlay{position:fixed; inset:0; background:rgba(16,24,40,.45); z-index:100; display:none;}
#drawer-overlay.show{display:block;}
#drawer{
  position:fixed; top:0; right:-560px; width:520px; max-width:92vw; height:100vh; background:#fff; z-index:101;
  box-shadow:-8px 0 24px rgba(16,24,40,.15); transition:right .22s ease; display:flex; flex-direction:column;
}
#drawer.show{right:0;}
.drawer-head{padding:16px 18px; border-bottom:1px solid var(--border);}
.drawer-head-top{display:flex; justify-content:space-between; align-items:flex-start; gap:10px;}
.drawer-id{font-size:11.5px; color:var(--text2); font-weight:700;}
.drawer-title{font-size:16.5px; font-weight:700; margin-top:3px;}
.drawer-close{border:none; background:none; cursor:pointer; color:var(--text2); width:32px; height:32px; border-radius:8px; display:flex; align-items:center; justify-content:center;}
.drawer-close:hover{background:var(--bg);}
.drawer-badges{display:flex; gap:6px; flex-wrap:wrap; margin-top:9px; align-items:center;}
.drawer-tabs{display:flex; gap:2px; padding:0 18px; border-bottom:1px solid var(--border); overflow-x:auto;}
.dtab-btn{border:none; background:none; padding:11px 11px; font-size:12.5px; font-weight:600; color:var(--text2); cursor:pointer; border-bottom:2px solid transparent; white-space:nowrap;}
.dtab-btn.active{color:var(--text); border-bottom-color:var(--red); font-weight:700;}
.drawer-body{flex:1; overflow-y:auto; padding:18px;}
.drawer-foot{padding:14px 18px; border-top:1px solid var(--border); display:flex; gap:8px; flex-wrap:wrap;}
.dinfo-row{margin-bottom:14px;}
.dinfo-row h5{font-size:11.5px; text-transform:uppercase; color:var(--text2); letter-spacing:.3px; margin-bottom:6px;}
.dinfo-row p{font-size:13.5px;}
.checklist-item{display:flex; align-items:center; gap:9px; padding:7px 0; font-size:13.5px;}
.checklist-item input{width:16px; height:16px; cursor:pointer;}
.checklist-item.done label{text-decoration:line-through; color:var(--text2);}
.comment-item{padding:10px 0; border-bottom:1px solid var(--border);}
.comment-item:last-child{border-bottom:none;}
.comment-author{font-weight:700; font-size:13px;}
.comment-time{font-size:11.5px; color:var(--text2); margin-left:6px; font-weight:400;}
.comment-text{font-size:13px; margin-top:3px;}
.comment-input{display:flex; gap:8px; margin-top:12px;}
.comment-input textarea{flex:1; border:1px solid var(--border); border-radius:9px; padding:9px; font-size:13px; font-family:inherit; resize:vertical; min-height:38px;}
.history-item{display:flex; gap:10px; padding:9px 0; font-size:12.5px; border-bottom:1px solid var(--border);}
.history-item:last-child{border-bottom:none;}
.history-dot{width:8px;height:8px;border-radius:50%;background:var(--blue); margin-top:5px; flex:none;}
.history-time{color:var(--text2); width:120px; flex:none;}

/* Modal */
#modal-overlay{position:fixed; inset:0; background:rgba(16,24,40,.45); z-index:120; display:none; align-items:center; justify-content:center;}
#modal-overlay.show{display:flex;}
.modal-box{background:#fff; border-radius:var(--radius); width:480px; max-width:92vw; max-height:88vh; overflow-y:auto; box-shadow:var(--shadow-lg);}
.modal-head{padding:18px 20px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center;}
.modal-head h3{font-size:16px;}
.modal-body{padding:20px;}
.modal-foot{padding:14px 20px; border-top:1px solid var(--border); display:flex; justify-content:flex-end; gap:8px;}
.form-row{margin-bottom:14px;}
.form-row label{display:block; font-size:12.5px; font-weight:600; margin-bottom:6px; color:var(--text2);}
.form-row input[type=text], .form-row input[type=date], .form-row select, .form-row textarea{
  width:100%; height:38px; border:1px solid var(--border); border-radius:8px; padding:0 10px; font-size:13.5px; font-family:inherit;
}
.form-row textarea{height:80px; padding:9px 10px; resize:vertical;}
.form-row .req{color:var(--red);}
.form-check{display:flex; align-items:center; gap:8px; font-size:13px;}
.option-row{border:1px solid var(--border); border-radius:10px; padding:12px; margin-bottom:9px; cursor:pointer;}
.option-row:hover{border-color:var(--graphite);}
.option-row .opt-label{font-weight:700; font-size:13.5px;}
.option-row .opt-impact{font-size:12.5px; color:var(--text2); margin-top:4px;}

/* Toasts */
#toast-root{position:fixed; top:70px; right:20px; z-index:300; display:flex; flex-direction:column; gap:8px;}
.toast{
  min-width:280px; max-width:360px; background:#1D1F23; color:#fff; border-radius:10px; padding:12px 14px; display:flex; align-items:flex-start;
  gap:10px; box-shadow:var(--shadow-lg); animation:toastin .2s ease;
}
.toast.success{background:#1D1F23; border-left:4px solid var(--green);}
.toast.warn{background:#1D1F23; border-left:4px solid var(--amber);}
.toast.error{background:#1D1F23; border-left:4px solid var(--red);}
.toast-text{font-size:13px; flex:1;}
.toast-close{background:none; border:none; color:#9AA1AC; cursor:pointer; flex:none;}
@keyframes toastin{from{opacity:0; transform:translateX(20px);} to{opacity:1; transform:translateX(0);}}

/* Tour */
#tour-layer{position:fixed; inset:0; z-index:400; display:none; pointer-events:none;}
#tour-layer.show{display:block;}
#tour-dim{position:fixed; inset:0; background:rgba(16,24,40,.55); pointer-events:auto;}
#tour-box{
  position:fixed; width:300px; background:#fff; border-radius:var(--radius); box-shadow:var(--shadow-lg); padding:16px; pointer-events:auto; z-index:401;
}
#tour-box .tour-step{font-size:11px; font-weight:700; color:var(--red); margin-bottom:6px;}
#tour-box h4{font-size:15px; margin-bottom:6px;}
#tour-box p{font-size:13px; color:var(--text2); margin-bottom:14px;}
.tour-foot{display:flex; justify-content:space-between; align-items:center;}
#tour-highlight{position:fixed; border-radius:10px; box-shadow:0 0 0 4px #fff, 0 0 0 6px var(--red); z-index:399; pointer-events:none; transition:all .2s;}

.empty-state{text-align:center; padding:40px 20px; color:var(--text2);}
.hidden{display:none !important;}
.lock-note{font-size:11.5px; color:var(--text2); display:flex; align-items:center; gap:5px; margin-top:6px;}
.flash-highlight{animation:flashhl 1.6s ease;}
@keyframes flashhl{0%{box-shadow:0 0 0 3px var(--blue);} 100%{box-shadow:none;}}

@media (max-width:1180px){
  .grid-4{grid-template-columns:repeat(2,1fr);}
  #app{min-width:0;}
  main#main-content{padding:16px;}
  #drawer{width:100vw;}
  .now-grid{grid-template-columns:1fr;}
}
</style>
</head>
<body>
<div id="app">

<header class="topbar">
  <div class="tb-left">
    <span class="logo">DEMIAND</span>
    <span class="sysname">Производственный календарь</span>
  </div>
  <div class="tb-center">
    <select class="select-model" id="modelSelect" aria-label="Выбор модели"></select>
    <div class="search-wrap">
      <span class="search-icon" id="searchIconSlot"></span>
      <input type="text" class="search-input" id="globalSearch" placeholder="Найти модель, этап, задачу или сотрудника" aria-label="Глобальный поиск">
      <div class="search-results hidden" id="searchResults"></div>
    </div>
  </div>
  <div class="tb-right">
    <button class="hint-btn" id="tourBtn" aria-haspopup="dialog">Показать подсказки</button>
    <button class="icon-btn" id="calTodayBtn" title="К сегодняшнему дню" aria-label="Перейти к сегодняшнему дню в календаре"></button>
    <button class="icon-btn" id="apprIconBtn" title="Решения" aria-label="Открыть решения"></button>
    <button class="icon-btn" id="bellBtn" aria-haspopup="true" aria-label="Уведомления"></button>
    <div class="tb-user" id="userMenuBtn" tabindex="0" aria-haspopup="true" aria-expanded="false">
      <div class="avatar">ЕК</div>
      <div class="tb-user-meta">
        <div class="tb-user-name">Екатерина</div>
        <div class="tb-user-role" id="tbRoleLabel"></div>
      </div>
    </div>
  </div>
  <div class="usermenu" id="userMenu" role="menu"></div>
  <div class="notifmenu" id="notifMenu" role="menu"></div>
</header>

<nav class="tabsnav" id="tabsNav"></nav>
<div class="context-bar" id="contextBar"></div>
<div id="breadcrumbBar"></div>

<main id="main-content"></main>
</div>

<div id="drawer-overlay"></div>
<div id="drawer" role="dialog" aria-modal="true" aria-label="Детали задачи"></div>

<div id="modal-overlay"><div class="modal-box" id="modalBox" role="dialog" aria-modal="true"></div></div>

<div id="toast-root" aria-live="polite"></div>
<div class="tooltip-pop" id="tooltipPop" role="tooltip"></div>
<div class="popover" id="stagePopover" role="dialog" aria-label="Краткая информация об этапе"></div>

<div id="tour-layer">
  <div id="tour-dim"></div>
  <div id="tour-highlight"></div>
  <div id="tour-box" role="dialog" aria-modal="true"></div>
</div>

function cloneDefaults(){
  return {
    tasks: JSON.parse(JSON.stringify(TASKS_DEFAULT)),
    stages: JSON.parse(JSON.stringify(STAGES_DK5700_DEFAULT)),
    checkpoints: JSON.parse(JSON.stringify(CHECKPOINTS_DEFAULT)),

    events: JSON.parse(JSON.stringify(EVENTS_DEFAULT)),
    ui:{ role:'manager', section:null, model:'dk5700', modelView:false, modelSubtab:'overview' }
  };
}
function loadDB(){
  try{
    const raw=localStorage.getItem(DB_KEY);
    if(raw) return JSON.parse(raw);
    const old=localStorage.getItem(DB_KEY_OLD);
    if(old){ const p=JSON.parse(old); const d=cloneDefaults(); if(p.ui){ if(p.ui.role) d.ui.role=p.ui.role; if(p.ui.model) d.ui.model=p.ui.model; } return d; }
  }catch(e){}
  return cloneDefaults();
}

function fmtTaskDue(d){
  if(d.indexOf('T')>-1){ const parts=d.split('T'); const date=parts[0], time=parts[1];
    return (date==='2026-07-16'?'сегодня':fmtDate(date))+', '+time; }
  if(d==='2026-07-16') return 'сегодня';
  return fmtDate(d);
}

/* Единый человекочитаемый статус для компактной карточки задачи */
function mainStatusText(t){
  if(t.status==='done') return {text:'Выполнено', sub:'Результат принят', color:'#079455', bg:'#ECFDF3', icon:'check'};
  if(t.status==='overdue') return {text:'Просрочено', sub:'Требует немедленного внимания — '+esc(t.assignee), color:'#B42318', bg:'#FEF3F2', icon:'alertTriangle'};
  if(t.approvalStatus==='in_review') return {text:'Ожидает согласования', sub:'Работа завершена, решение ожидается от '+esc(t.approver||'согласующего'), color:'#7C3AED', bg:'#F5F3FF', icon:'eye'};
  if(t.approvalStatus==='needs_revision') return {text:'Требуются правки', sub:'Вернулось на доработку', color:'#B45309', bg:'#FFFAEB', icon:'undo'};
  if(t.status==='blocked') return {text:'Заблокировано', sub:'Ожидает другой отдел', color:'#B45309', bg:'#FFFAEB', icon:'lock'};
  if(t.status==='in_progress') return {text:'В работе', sub:t.progress[0]+' из '+t.progress[1]+' пунктов чек-листа', color:'#2563EB', bg:'#EFF4FF', icon:'loader'};
  if(t.status==='ready') return {text:'Готово к старту', sub:'Можно приступать', color:'#0EA5E9', bg:'#F0F9FF', icon:'play'};
  return {text:'Не начато', sub:'Ожидает своей очереди', color:'#667085', bg:'#F2F4F7', icon:'clock'};
}
function mainStatusBadge(t){ const s=mainStatusText(t); return `<span class="badge" style="background:${s.bg};color:${s.color}">${ic(s.icon,13)}${s.text}</span>`; }

/* =========================================================
   TOAST
========================================================= */
function toast(text, type='success'){
  const root=document.getElementById('toast-root');
  const el=document.createElement('div');
  el.className='toast '+type;
  const iconName = type==='success'?'check':type==='warn'?'alertTriangle':'alertCircle';
  el.innerHTML = `${ic(iconName,17)}<div class="toast-text">${esc(text)}</div><button class="toast-close" aria-label="Закрыть уведомление">${ic('x',14)}</button>`;
  el.querySelector('.toast-close').onclick=()=>el.remove();
  root.appendChild(el);
  setTimeout(()=>{ el.style.transition='opacity .3s'; el.style.opacity='0'; setTimeout(()=>el.remove(),300); }, 3800);
}

  lockNote:'Изменить это поле может руководитель проекта.',
};
function ttHtml(key){ return ` <button type="button" class="tt-trigger" data-tt="${key}" aria-label="Подсказка: ${esc(TOOLTIP_TEXT[key]||'')}" role="button">?</button>`; }
function bindTooltips(){
  const pop=document.getElementById('tooltipPop');
  document.querySelectorAll('[data-tt]').forEach(el=>{
    const show=()=>{
      const txt=TOOLTIP_TEXT[el.dataset.tt]; if(!txt) return;
      pop.textContent=txt; pop.classList.add('show');
      const r=el.getBoundingClientRect();
      let top=r.top-8-pop.offsetHeight, left=r.left+r.width/2-130;
      if(top<10) top=r.bottom+8;
      left=Math.max(10,Math.min(left, window.innerWidth-270));
      pop.style.top=top+'px'; pop.style.left=left+'px';
    };
    const hide=()=>pop.classList.remove('show');
    el.addEventListener('mouseenter',show); el.addEventListener('mouseleave',hide);
    el.addEventListener('focus',show); el.addEventListener('blur',hide);
    el.addEventListener('click',(e)=>{ e.stopPropagation(); show(); });
  });
}
document.addEventListener('keydown', e=>{ if(e.key==='Escape'){ document.getElementById('tooltipPop').classList.remove('show'); } });

/* copy link with fallback — some sandboxed contexts never settle the Clipboard promise, so race it against a timeout */
function copyLink(hash, label){
  const url = location.origin + location.pathname + '#' + hash;
  let settled=false;
  const done=()=>{ if(settled) return; settled=true; toast('Ссылка скопирована','success'); };
  const fallback=()=>{ if(settled) return; settled=true; fallbackCopy(url,()=>toast('Ссылка скопирована','success')); };
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(url).then(done).catch(fallback);
    setTimeout(fallback, 600);
  } else fallback();
}
function fallbackCopy(text, cb){
  const ta=document.createElement('textarea'); ta.value=text; ta.style.position='fixed'; ta.style.opacity='0';
  document.body.appendChild(ta); ta.focus(); ta.select();
  try{ document.execCommand('copy'); }catch(e){}
  document.body.removeChild(ta); if(cb) cb();
}

function taskToTodayCard(t){
  const model=findModel(t.project);
  let label='Открыть', action='openTask';
  if((t.approvalStatus==='not_sent'||t.approvalStatus==='needs_revision') && t.status!=='blocked' && t.status!=='not_started'){ label='Отправить на согласование'; action='quickSendApproval'; }
  else if(t.status==='blocked'){ label='Посмотреть причину'; action='openTask'; }
  else if(t.approvalStatus==='in_review' && (DB.ui.role==='manager'||DB.ui.role==='founder')){ label='Открыть решение'; action='openTask'; }
  const why = t.blocks && t.blocks.length ? ('После выполнения можно будет продолжить: '+t.blocks.map(id=>{const bt=findTask(id); return bt?bt.title:id;}).join(', ')) : (t.description||'');
  return `<div class="today-card">
    <div class="today-action">${esc(t.title)}</div>
    <div class="today-meta">${esc(model.short)} · ${fmtTaskDue(t.dueDate)}</div>
    ${why?`<div class="today-why">${esc(why)}</div>`:''}
    <div class="today-foot"><button class="btn btn-sm btn-primary" data-action="${action}" data-id="${t.id}">${label}</button></div>
  </div>`;
}
function decisionToTodayCard(d){
  const model=findModel(d.project);
  return `<div class="today-card">
    <div class="today-action">${esc(d.title)}</div>
    <div class="today-meta">${esc(model.short)} · срок ${esc(d.due)}</div>
    <div class="today-why">${esc(d.situation)}</div>
    <div class="today-foot"><button class="btn btn-sm btn-primary" data-action="openTask" data-id="${d.relatedTask||''}" ${!d.relatedTask?'disabled':''}>Открыть</button></div>
  </div>`;
}
function buildTodayGroups(){
  const role=DB.ui.role;
  const mine = t => t.assignee.indexOf('Екатерина')===0;
  const deptScope = t => t.department==='creators';
  const base = role==='employee' ? DB.tasks.filter(mine) : DB.tasks.filter(t=>mine(t)||deptScope(t));
  const todo=[], waiting=[], done=[];
  base.forEach(t=>{
    if(t.status==='done'){ done.push(t); return; }
    if(t.status==='blocked'){ waiting.push(t); return; }
    if(t.approvalStatus==='in_review'){
      if((role==='manager'||role==='founder') && t.approver && t.approver!=='Фаундер'){ todo.push(t); }
      else waiting.push(t);
      return;
    }
    todo.push(t);
  });
  return {todo, waiting, done};
}
function renderTodayTab(){
  const role=DB.ui.role;
  if(!UI.todayToggle) UI.todayToggle='todo';
  const groups=buildTodayGroups();
  const todayCount = groups.todo.length;
  const decisionCount = role==='manager' ? DB.tasks.filter(t=>t.approvalStatus==='in_review' && t.approver && t.approver!=='Фаундер').length : 0;
  let list;
  if(UI.todayToggle==='todo') list=groups.todo;
  else if(UI.todayToggle==='waiting') list=groups.waiting;
  else list=groups.done;
  const toggles=[{key:'todo',label:'Нужно сделать',n:groups.todo.length},{key:'waiting',label:'Жду других',n:groups.waiting.length},{key:'done',label:'Завершено',n:groups.done.length}];
  return `
  <h1 class="section-title">Доброе утро, Екатерина</h1>
  <p class="section-sub">На сегодня у вас ${todayCount} действий${decisionCount?` и ${decisionCount} согласования сотрудников`:''}</p>
  <div class="cal-views" style="margin-bottom:16px;">${toggles.map(t=>`<button class="cal-view-btn ${UI.todayToggle===t.key?'active':''}" data-action="setTodayToggle" data-tab="${t.key}">${t.label} (${t.n})</button>`).join('')}</div>
  ${list.length?list.map(taskToTodayCard).join(''):'<div class="empty-state">Нет задач в этой группе</div>'}
  `;
}

function renderGantt(model){
  const depts=Object.keys(DEPARTMENTS);
  const scaleStart=new Date(2026,6,1), scaleEnd=new Date(2026,8,30);
  const totalDays=(scaleEnd-scaleStart)/86400000;
  function pos(dstr){ return Math.max(0,Math.min(100,((new Date(dstr)-scaleStart)/86400000/totalDays)*100)); }
  const todayPos=pos('2026-07-16');
  const rows=depts.map(dk=>{
    const tasks=DB.tasks.filter(t=>t.project===model.id && t.department===dk);
    if(!tasks.length) return null;
    const collapsed=!!UI.ganttCollapsed[dk];
    const rowH=collapsed?40:Math.max(40,tasks.length*30+10);
    const bars=collapsed?'':tasks.map((t,i)=>{
      const left=pos(t.startDate), right=pos(t.dueDate.split('T')[0]);
      return `<div class="gantt-task" data-action="openTask" data-id="${t.id}" style="left:${left}%;width:${Math.max(3,right-left)}%;top:${i*30+7}px;background:${TASK_STATUS[t.status].color};" title="${esc(t.title)}">${esc(t.title)}</div>`;
    }).join('');
    return {dk,tasks,collapsed,rowH,bars};
  }).filter(Boolean);
  const scaleLabels = UI.ganttScale==='weeks' ? [...Array(13)].map((_,i)=>'Н'+(i+1)) : ['Июль','Август','Сентябрь'];
  return `<div style="margin-bottom:10px;display:flex;justify-content:flex-end;gap:6px;">

  </div>
  <div class="gantt-wrap">
    <div class="gantt-left">
      <div class="gantt-left-head">Отдел</div>
      ${rows.map(r=>`<div class="gantt-dept-row" style="height:${r.collapsed?40:r.rowH}px;" data-action="toggleGanttDept" data-dept="${r.dk}">${ic(r.collapsed?'chevRight':'chevDown',14)} ${DEPARTMENTS[r.dk].name} <span style="color:var(--text2);font-weight:400;">(${r.tasks.length})</span></div>`).join('')}
    </div>
    <div class="gantt-right">

    </div>

}

function positionPopover(pop, target){
  const r=target.getBoundingClientRect();
  let left=Math.min(window.innerWidth-296, Math.max(10,r.left));
  let top=r.bottom+8;
  if(top+240>window.innerHeight) top=Math.max(10,r.top-248);
  pop.style.left=left+'px'; pop.style.top=top+'px';
  pop.classList.add('show'); bindTooltips();
  setTimeout(()=>document.addEventListener('click', closePopoverOnOutsideClick),0);
}
function closePopoverOnOutsideClick(e){
  const pop=document.getElementById('stagePopover');
  if(!pop.contains(e.target)){ pop.classList.remove('show'); document.removeEventListener('click', closePopoverOnOutsideClick); }
}
function openStageFromPopover(stageId){
  document.getElementById('stagePopover').classList.remove('show');
  const stage=findStage(stageId);
  UI.focusedStage['dk5700']=stageId; UI.ganttOn=false;
  openModelView('dk5700','path');
  setTimeout(()=>{ const el=document.getElementById('stagews-'+stageId); if(el) el.scrollIntoView({behavior:'smooth', block:'start'}); },60);
}

function calendarBaseEvents(){
  let evs=DB.events;
  if(DB.ui.role==='employee'){ evs = evs.filter(e=> e.assignee.indexOf('Екатерина')===0 || e.department==='creators'); }
  return evs;
}
function applyCalFilters(events){
  const f=UI.calFilters;
  return events.filter(e=>{
    if(f.model!=='all' && e.project!==f.model) return false;
    if(f.department!=='all' && e.department!==f.department) return false;
    if(f.type!=='all' && e.type!==f.type) return false;
    if(f.status!=='all' && e.status!==f.status) return false;
    if(f.critical && !e.critical) return false;
    if(f.mine && e.assignee.indexOf('Екатерина')!==0) return false;
    if(f.approvalsOnly && e.type!=='approval') return false;
    if(f.handoffsOnly && e.type!=='handoff') return false;
    return true;
  });
}
function startOfWeek(d){ const x=new Date(d); const day=(x.getDay()+6)%7; x.setDate(x.getDate()-day); return x; }
function isSameDay(a,b){ return a.getFullYear()===b.getFullYear()&&a.getMonth()===b.getMonth()&&a.getDate()===b.getDate(); }
function calPeriodLabel(){
  const monthsNom=['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];
  const monthsGen=['января','февраля','марта','апреля','мая','июня','июля','августа','сентября','октября','ноября','декабря'];
  const d=UI.calDate;
  if(UI.calView==='week'){ const s=startOfWeek(d); const e=new Date(s); e.setDate(e.getDate()+6); return s.getDate()+' — '+e.getDate()+' '+monthsGen[e.getMonth()]; }
  return monthsNom[d.getMonth()]+' '+d.getFullYear();
}
function calFilterSelect(key,label,options){
  return `<select data-action="calFilterChange" data-f="${key}" aria-label="${label}">${options.map(([v,l])=>`<option value="${v}" ${UI.calFilters[key]===v?'selected':''}>${l}</option>`).join('')}</select>`;
}
function renderCalMonth(events){
  const d=UI.calDate; const year=d.getFullYear(), month=d.getMonth();
  const firstDay=new Date(year,month,1); const startOffset=(firstDay.getDay()+6)%7;
  const daysInMonth=new Date(year,month+1,0).getDate();
  const prevDays=new Date(year,month,0).getDate();
  const cells=[];
  for(let i=startOffset-1;i>=0;i--) cells.push({day:prevDays-i, other:true, date:new Date(year,month-1,prevDays-i)});
  for(let i=1;i<=daysInMonth;i++) cells.push({day:i, other:false, date:new Date(year,month,i)});
  let nextDay=1;
  while(cells.length<42){ cells.push({day:nextDay, other:true, date:new Date(year,month+1,nextDay)}); nextDay++; }
  const dow=['Пн','Вт','Ср','Чт','Пт','Сб','Вс'];
  const html = cells.map(c=>{
    const dayEvents = events.filter(e=>isSameDay(new Date(e.dateStart), c.date));
    const isToday = isSameDay(c.date, TODAY);
    const shown=dayEvents.slice(0,3); const more=dayEvents.length-shown.length;
    return `<div class="cal-cell ${c.other?'other':''} ${isToday?'today':''}" data-action="openDayList" data-date="${c.date.getFullYear()}-${String(c.date.getMonth()+1).padStart(2,'0')}-${String(c.date.getDate()).padStart(2,'0')}">
      <div class="cal-daynum">${c.day}</div>
      ${shown.map(e=>`<div class="cal-ev" style="background:${EVENT_TYPES[e.type].bg};color:${EVENT_TYPES[e.type].color}" data-action="openEvent" data-id="${e.id}">${ic(EVENT_TYPES[e.type].icon,11)}${esc(e.title)}</div>`).join('')}
      ${more>0?`<div class="cal-more">+ ещё ${more}</div>`:''}
    </div>`;
  }).join('');
  return `<div class="cal-grid">${dow.map(x=>`<div class="cal-dow">${x}</div>`).join('')}${html}</div>`;
}
function renderCalWeek(events){
  const start=startOfWeek(UI.calDate);
  const days=[...Array(7)].map((_,i)=>{ const dd=new Date(start); dd.setDate(dd.getDate()+i); return dd; });
  const dow=['Понедельник','Вторник','Среда','Четверг','Пятница','Суббота','Воскресенье'];
  return `<div class="grid grid-4" style="grid-template-columns:repeat(7,1fr);">
    ${days.map((dd,i)=>{
      const dayEvents=events.filter(e=>isSameDay(new Date(e.dateStart),dd));
      const isToday=isSameDay(dd,TODAY);
      return `<div class="card" style="padding:10px;${isToday?'border-color:#D0D5DD;background:var(--graphite-bg);':''}">
        <div style="font-size:11px;font-weight:700;color:var(--text2);">${dow[i]}</div>
        <div style="font-size:16px;font-weight:800;margin-bottom:8px;${isToday?'color:var(--graphite)':''}">${dd.getDate()}</div>
        ${dayEvents.length?dayEvents.map(e=>`<div class="cal-ev" style="background:${EVENT_TYPES[e.type].bg};color:${EVENT_TYPES[e.type].color};white-space:normal;margin-bottom:5px;" data-action="openEvent" data-id="${e.id}">${ic(EVENT_TYPES[e.type].icon,11)}${esc(e.title)}</div>`).join(''):'<div style="font-size:11px;color:#C0C5CD;">—</div>'}
      </div>`;
    }).join('')}
  </div>`;
}

      <div class="form-row"><label>Версия</label><input type="text" id="mVersion" value="v1"></div>
      <div class="form-row"><label>Согласующий <span class="req">*</span></label><select id="mApprover"><option>Фаундер / директорат</option><option>Дмитрий (продукт)</option><option>Екатерина (рук. креаторов)</option></select></div>

    </div>

  `;
  openModal(html);
}
function submitApproval(kind,id){
  if(kind==='task'){ const t=findTask(id); t.approvalStatus='in_review'; t.approvalHistory.push({time:'сегодня, '+nowTimeStr(), text:'Отправлено на согласование'}); t.history.push({time:'сегодня, '+nowTimeStr(), text:'Отправлено на согласование'}); }
  else if(kind==='event'){ const e=DB.events.find(x=>x.id===id); e.status='in_review'; }
  closeModal();
  toast('Результат отправлен на согласование','success');
  rerenderAll();
}
function openReviseModalGeneric(onSubmitAction, id){
  const html=`<div class="modal-head"><h3>Вернуть на доработку</h3><button class="drawer-close" data-action="closeModal" aria-label="Закрыть">${ic('x',18)}</button></div>

  </div>

}
function openReviseTaskModal(id){ openReviseModalGeneric('submitReviseTask', id); }
function submitReviseTask(id){
  const comment=document.getElementById('mReviseComment').value.trim();
  if(!comment){ toast('Комментарий обязателен для возврата на доработку','error'); return; }
  const t=findTask(id);
  t.approvalStatus='needs_revision';
  t.approvalHistory.push({time:'сегодня, '+nowTimeStr(), text:'Возвращено на доработку: '+comment});
  t.history.push({time:'сегодня, '+nowTimeStr(), text:'Результат возвращён на доработку'});
  closeModal();
  toast('Результат возвращён на доработку','warn');
  rerenderAll();
}
function openReturnCommentModal(id){ openReviseModalGeneric('submitReturnDecision', id); }
function submitReturnDecision(id){
  const comment=document.getElementById('mReviseComment').value.trim();
  if(!comment){ toast('Комментарий обязателен для возврата с комментарием','error'); return; }
  const d=findDecision(id); d.status='revision'; d.returnComment=comment;
  if(d.relatedTask){ const t=findTask(d.relatedTask); if(t){ t.approvalStatus='needs_revision'; t.approvalHistory.push({time:'сегодня, '+nowTimeStr(), text:'Возвращено с комментарием: '+comment}); } }

function selectDecisionOption(id, idx){
  const d=findDecision(id); const opt=d.options[parseInt(idx)];
  d.status='approved'; d.chosenOption=opt.label;
  if(d.relatedTask){ const t=findTask(d.relatedTask); if(t){ t.approvalStatus='approved'; t.status='done'; unlockDependents(t.id); } }
  closeModal();
  toast('Выбран вариант: '+opt.label,'success');
  rerenderAll();
}
function confirmRecommendation(id){
  const d=findDecision(id); if(!d) return;
  d.status='approved';
  if(d.relatedTask){ const t=findTask(d.relatedTask); if(t){ t.approvalStatus='approved'; t.status='done'; t.approvalHistory.push({time:'сегодня, '+nowTimeStr(), text:'Рекомендация подтверждена фаундером'}); unlockDependents(t.id); } }
  toast('Согласование завершено','success');
  rerenderAll();
}
function unlockDependents(taskId){
  DB.tasks.forEach(t=>{
    if(t.dependsOn.includes(taskId) && (t.status==='blocked'||t.status==='not_started')){
      const allDepsOk = t.dependsOn.every(dep=>{ const d=findTask(dep); return d && d.status==='done'; });
      if(allDepsOk){ t.status='ready'; t.history.push({time:'сегодня, '+nowTimeStr(), text:'Задача разблокирована'}); toast('Следующая задача разблокирована','success'); }
    }
  });
}
function decideTask(decision, id){
  const t=findTask(id); if(!t) return;
  if(decision==='approve'){ t.approvalStatus='approved'; t.status='done'; t.approvalHistory.push({time:'сегодня, '+nowTimeStr(), text:'Согласовано'}); unlockDependents(t.id); toast('Согласование завершено','success'); }

function pickFileAndRun(cb){
  const inp=document.createElement('input'); inp.type='file'; inp.style.display='none'; document.body.appendChild(inp);

function transferCheckpoint(id){

function runSearch(q){
  const box=document.getElementById('searchResults');
  if(!q || q.length<1){ box.classList.add('hidden'); box.innerHTML=''; return; }
  const ql=q.toLowerCase();
  const hl=(s)=>{ const i=s.toLowerCase().indexOf(ql); if(i<0) return esc(s); return esc(s.slice(0,i))+'<mark>'+esc(s.slice(i,i+q.length))+'</mark>'+esc(s.slice(i+q.length)); };
  const models=MODELS_DEFAULT.filter(m=>m.name.toLowerCase().includes(ql));
  const stages=DB.stages.filter(s=>s.name.toLowerCase().includes(ql));
  const tasks=DB.tasks.filter(t=>t.title.toLowerCase().includes(ql)||t.assignee.toLowerCase().includes(ql)).slice(0,6);
  if(!models.length && !stages.length && !tasks.length){ box.innerHTML='<div class="empty-state" style="padding:16px;">Ничего не найдено</div>'; box.classList.remove('hidden'); return; }
  let html='';
  if(models.length) html+=`<div class="sr-group">Модели</div>`+models.map(m=>`<div class="sr-item" data-action="openModelView" data-id="${m.id}">${ic('package',15)}${hl(m.name)}</div>`).join('');
  if(stages.length) html+=`<div class="sr-group">Этапы</div>`+stages.map(s=>`<div class="sr-item" data-action="openStageFromPopover" data-id="${s.id}">${ic('grid',15)}${hl(s.name)}</div>`).join('');
  if(tasks.length) html+=`<div class="sr-group">Задачи</div>`+tasks.map(t=>`<div class="sr-item" data-action="openTask" data-id="${t.id}">${ic('briefcase',15)}${hl(t.title)}</div>`).join('');
  box.innerHTML=html; box.classList.remove('hidden');
}

function startTour(){
  UI.tourActive=true; UI.tourStep=0; UI.tourRole = DB.ui.role==='founder' ? 'founder' : 'other';

function endTour(){ UI.tourActive=false; document.getElementById('tour-layer').classList.remove('show'); }
function showTourStep(){
  const steps=TOUR_STEPS[UI.tourRole];
  const step=steps[UI.tourStep];
  const box=document.getElementById('tour-box'); const hl=document.getElementById('tour-highlight');
  let target=null;
  try{ target=document.querySelector(step.sel); }catch(e){ target=null; }
  const r = target ? target.getBoundingClientRect() : {top:80,left:80,width:300,height:120};
  hl.style.top=(r.top-6)+'px'; hl.style.left=(r.left-6)+'px'; hl.style.width=(r.width+12)+'px'; hl.style.height=(r.height+12)+'px';
  let boxTop=r.bottom+16; let boxLeft=Math.min(window.innerWidth-320, Math.max(16,r.left));
  if(boxTop+180>window.innerHeight) boxTop=Math.max(16,r.top-190);
  box.style.top=boxTop+'px'; box.style.left=boxLeft+'px';
  box.innerHTML=`
    <div class="tour-step">Шаг ${UI.tourStep+1} из ${steps.length}</div>
    <h4>${esc(step.title)}</h4><p>${esc(step.text)}</p>

}

========================================================= */
function pushHashForState(){
  let h='';
  if(DB.ui.modelView){
    h='model='+DB.ui.model;
    if(DB.ui.modelSubtab==='path' && UI.focusedStage[DB.ui.model]) h+='&stage='+UI.focusedStage[DB.ui.model];
    else if(DB.ui.modelSubtab!=='overview') h+='&view='+DB.ui.modelSubtab;
  } else if(!DB.ui.role==='founder' && DB.ui.section==='decisions'){ h='decisions'; }
  if(history.replaceState) history.replaceState(null,'','#'+h); else location.hash=h;
}
function copyLinkFor(kind,id){
  if(kind==='model') copyLink('model='+id);
  else if(kind==='stage'){ const st=findStage(id); copyLink('model=dk5700&stage='+id); }
  else if(kind==='task') copyLink('model='+(findTask(id)?findTask(id).project:'dk5700')+'&task='+id);
  else if(kind==='decision') copyLink('decision='+id);
  else if(kind==='event') copyLink('event='+id);
}
function applyHash(){
  const raw=location.hash.replace('#','');
  if(!raw) return;
  const params={};
  raw.split('&').forEach(p=>{ const [k,v]=p.split('='); if(k) params[k]=decodeURIComponent(v||''); });
  if(params.decision){
    DB.ui.section='decisions';
    if(DB.ui.role!=='founder'){ /* keep role as-is; decisions tab only exists for founder in nav, but we still open drawer via a temp view */ DB.ui.section = DB.ui.role==='founder'?'decisions':DB.ui.section; }
    rerenderAll();
    if(DB.ui.role==='founder') setTimeout(()=>openDecisionFocused(params.decision),80);
    return;
  }
  if(params.model){
    openModelView(params.model, params.view||'overview');
    if(params.stage){ UI.focusedStage[params.model]=params.stage; UI.ganttOn=false; rerenderAll(); }
    if(params.task){ setTimeout(()=>openTaskDrawer(params.task),100); }
    return;
  }
  if(params.event){ setTimeout(()=>openEventDrawer(params.event),50); return; }
}

    document.getElementById('searchResults').classList.add('hidden');
    document.getElementById('stagePopover').classList.remove('show');
    if(UI.tourActive) endTour();
  }
});
window.addEventListener('hashchange', applyHash);

/* =========================================================
   ИНИЦИАЛИЗАЦИЯ
========================================================= */
function normalizeDB(){
  DB.tasks.forEach(t=>{
    if(!t.comments) t.comments=[{author:t.assignee, time:'вчера, 14:20', text:'Начал(а) работу по задаче, ориентируюсь на входные требования.'}];
    if(!t.history) t.history=[{time:t.startDate.split('T')[0], text:'Задача создана'},{time:t.startDate.split('T')[0], text:'Назначен ответственный: '+t.assignee}];
    if(!t.approvalHistory) t.approvalHistory=[];
    if(t.launchImpact===undefined) t.launchImpact=null;
  });
  DB.stages.forEach(s=>{ if(!s.inputItems) s.inputItems=[]; if(!s.missingRequirements) s.missingRequirements=[]; });
  DB.checkpoints.forEach(c=>{ if(!c.history) c.history=[]; });
}
normalizeDB();
renderTopbar();
renderTabsNav();
renderContextBar();
renderBreadcrumbBar();
renderMain();
if(location.hash) applyHash();
</script>
